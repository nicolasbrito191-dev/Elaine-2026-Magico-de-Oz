<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f4f0;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Menu de Turmas */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2500;
            cursor: pointer;
            background: #8eb486;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        .menu-btn div {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        #unit-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 2600;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 80px 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.05);
        }
        #unit-menu.active { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 2550;
            backdrop-filter: blur(4px);
        }

        /* Seletor de Turma */
        #class-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            z-index: 4000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            transition: opacity 0.5s ease;
        }
        .class-circle {
            width: 130px; height: 130px;
            background: #8eb486; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.4s; border: 6px solid white; margin: 15px;
            box-shadow: 0 8px 20px rgba(142, 180, 134, 0.3);
            font-weight: bold;
        }
        .class-circle:hover { transform: scale(1.1) translateY(-5px); background: #7aa371; }

        /* Banner Principal */
        .banner {
            position: relative; height: 320px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; overflow: hidden;
            margin-bottom: 40px;
        }
        .banner-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            background-size: cover; background-position: center;
            filter: brightness(0.7); z-index: -1;
        }
        .banner h1 { font-family: 'Cherry Bomb One', cursive; font-size: 3.5rem; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); }

        /* Engrenagem Animada */
        .gear-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.4;
        }
        .gear {
            animation: rotateGear 10s linear infinite;
            fill: #fff;
            width: 60px;
            height: 60px;
        }
        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Estante e Livros */
        .library-container {
            max-width: 1100px; margin: 0 auto 60px auto; padding: 20px;
            background: white;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            border: 12px solid #fff;
        }
        
        .shelf-unit {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
        }

        .shelf-row {
            background: #e0e7e0;
            border-radius: 15px;
            margin-bottom: 40px;
            padding: 30px 20px 15px 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            position: relative;
            border-bottom: 15px solid #d4ddd4;
        }

        .book-container {
            width: 140px;
            perspective: 1000px;
            position: relative;
            margin-bottom: 25px;
            cursor: default; /* Removida a mãozinha de clique */
        }

        .book-cover {
            width: 100%;
            height: 190px;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: left;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .book-pages {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 100%;
            height: 180px;
            background: #f9f9f9;
            border-radius: 5px 15px 15px 5px;
            z-index: 1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Mantivemos o efeito visual de hover apenas para estética, sem clique */
        .book-container:hover .book-cover {
            transform: rotateY(-15deg) scale(1.02);
            box-shadow: 8px 5px 20px rgba(0,0,0,0.1);
        }

        .student-label {
            margin-top: 12px;
            background: #fff;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: bold;
            color: #5b7c53;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            line-height: 1.2;
            height: 40px;
        }

        footer {
            background: white;
            border-top: 2px solid #f0f4f0;
        }
    </style>
</head>
<body class="overflow-hidden">

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="unit-menu">
        <h2 class="text-2xl font-bold mb-6 text-green-800" style="font-family: 'Cherry Bomb One'">Menu</h2>
        <ul class="space-y-4">
            <li class="p-4 hover:bg-green-50 text-green-700 font-bold rounded-xl cursor-pointer border-2 border-green-100 flex items-center gap-3 transition-all" onclick="triggerChangeClass()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                Trocar Turma
            </li>
        </ul>
    </div>

    <div id="class-selector">
        <div class="text-center">
            <h2 class="font-bold text-4xl mb-12 text-green-900" style="font-family: 'Cherry Bomb One'">Escolha a Turma</h2>
            <div class="flex flex-wrap justify-center">
                <div class="class-circle" onclick="selectClass('5ºA')"><span>Turma</span><span>5ºA</span></div>
                <div class="class-circle" onclick="selectClass('5ºB')"><span>Turma</span><span>5ºB</span></div>
                <div class="class-circle" onclick="selectClass('5ºC')"><span>Turma</span><span>5ºC</span></div>
            </div>
        </div>
    </div>

    <header class="banner">
        <div class="banner-bg"></div>
        <h1>Mágico de Oz</h1>
        <p class="mt-4 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full font-bold">
            Unidade Campolim • <span id="display-class" class="text-yellow-300">...</span> • 2026
        </p>
        
        <div class="gear-container">
            <svg class="gear" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8C14.21 8 16 9.79 16 12C16 14.21 14.21 16 12 16C9.79 16 8 14.21 8 12C8 9.79 9.79 8 12 8M12 10C10.9 10 10 10.9 10 12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12C14 10.9 13.1 10 12 10M12 2C13.1 2 14 2.9 14 4V5.07C15.31 5.43 16.5 6.09 17.5 7L18.3 6.2C19.1 5.4 20.4 5.4 21.2 6.2C22 7 22 8.3 21.2 9.1L20.4 9.9C21.31 10.9 21.97 12.09 22.33 13.4H23.4C24.5 13.4 25.4 14.3 25.4 15.4C25.4 16.5 24.5 17.4 23.4 17.4H22.33C21.97 18.71 21.31 19.9 20.4 20.9L21.2 21.7C22 22.5 22 23.8 21.2 24.6C20.4 25.4 19.1 25.4 18.3 24.6L17.5 23.8C16.5 24.71 15.31 25.37 14 25.73V26.8C14 27.9 13.1 28.8 12 28.8C10.9 28.8 10 27.9 10 26.8V25.73C8.69 25.37 7.5 24.71 6.5 23.8L5.7 24.6C4.9 25.4 3.6 25.4 2.8 24.6C2 23.8 2 22.5 2.8 21.7L3.6 20.9C2.69 19.9 2.03 18.71 1.67 17.4H0.6C-0.5 17.4 -1.4 16.5 -1.4 15.4C-1.4 14.3 -0.5 13.4 0.6 13.4H1.67C2.03 12.09 2.69 10.9 3.6 9.9L2.8 9.1C2 8.3 2 7 2.8 6.2C3.6 5.4 4.9 5.4 5.7 6.2L6.5 7C7.5 6.09 8.69 5.43 10 5.07V4C10 2.9 10.9 2 12 2Z" />
            </svg>
        </div>
    </header>

    <main class="library-container">
        <div class="shelf-unit" id="shelf-manager"></div>
    </main>

    <footer class="text-center py-10 text-gray-400 font-bold">
        <p>Projeto de Leitura - Profª Elaine • 2026</p>
    </footer>

    <script>
        const ozCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';
        
        const studentsByClass = {
            '5ºA': [
                "ALÍCIA CALIXTO FALQUEIRO", "ANGELO BRUGINSKI SCUDERI", "ARTHUR KENJI NAKAGAWA",
                "BERNARDO CHRISTIAN RIBEIRO FREIRE", "CAROLINA DE QUEIROZ MOREIRA", "CECÍLIA LEONEL NALESSO",
                "DANIEL SALVARANI GUARINHO", "EDUARDO FANTAZZINI GRANDISOLI", "EMI SAKIHAMA",
                "FERNANDA AKARI KIMURA", "GAEL FARHA CONDE", "GUSTAVO DE SOUZA SAMPAIO",
                "GUSTAVO SILVA E SOUZA", "HELENA HERINGER ROCHA SAD", "HELOISA ROSA DE SOUZA BARRETO",
                "JÚLIA ROSÁTI SILVA", "LORENA DE CARVALHO SALLES", "LORENZO AMARAL FURIGO CARDOSO",
                "LUCAS CASTELLI ALBUQUERQUE", "LUCAS OLIVEIRA MAIA", "LUCAS TADEU MUNIZ DA SILVA",
                "LUIZA BELLOTTO BARRETTO", "MARINA SARTORETO FERNANDES", "PEDRO RIBEIRO DE OLIVEIRA",
                "RAFAEL WATANABE SOUZA BARBIERI", "RAFAELLA MUOIO POLIDO", "THEO BRITO SEGAMARCHI"
            ],
            '5ºB': [
                "ALICE BELLUCCI ASCENCIO", "ALICE DE FREITAS OLHIER", "ANTONELLA JULIO VETTORAZZO CHIESA REY",
                "ARTHUR CORDEIRO PIZA", "BERNARDO VENTURA SÃO PIETRO", "CAROLINA SAES RUIZ",
                "CATARINA MARQUES RAMOS", "CECÍLIA ZAN BARROSO", "EDUARDO FRANCO TOLEDO PINTO",
                "ENZO ANDRADE ALVES", "FELIPE GUIMARÃES DE SOUZA", "GABRIEL YUZUI VICECONTI",
                "GIOVANI DIEZEL MUNHOZ", "GIULIA REZENDE PASSOS", "ISABELA AGOSTINELI TRIDAPALLI",
                "ISABELLA BOAVENTURA GOMES DA SILVA OLIVEIRA", "LARISSA DAMASCENO BRUDER SANTINI",
                "LÍVIA MASCARENHAS BEDULLI", "LORENZO ATTIÊ BRUNI", "LUCAS BERNARDO MATUTINO DE OLIVEIRA",
                "MARCELLA TARABORELLI LIMONGELLI", "MARCELO SOUZA VARCA", "MARCUS MIGUEL CORDEIRO DE MORAES",
                "MARIA EDUARDA LEMOS LIMA", "MARIAH ANTONELLA MACIEL MAESTÁ", "MATEUS CARVALHO MADEIRA",
                "MATHEUS DA SILVA VACCARO", "PEDRO CAMPOS VIZCARRA ZUNIGA"
            ],
            '5ºC': [
                "ALICE VIEIRA ESTEVES", "BEATRIZ PAZINI SOARES", "BERNARDO MICHELETTI FRANCISCO",
                "CECÍLIA SALCEDO FERNANDES", "CLARA COSTA RIBAS FRAMIL SANCHES", "DAVI CARVALHO DE VASCONCELOS",
                "ENRICO FESTINO MARTORELLI", "GABRIEL MAMEDE DE ALMEIDA FERREIRA", "GABRIEL RIBEIRO DA SILVA",
                "GIOVANNA DA SILVA PRESTES", "GIOVANNA LA TORRE MARTINS", "GIULIA VIEIRA SACCOMANO",
                "JOÃO LUCCA SANTI SILVA", "JOSÉ FORTE PESSOA JUNIOR", "LAURA AGRA DE MORAES",
                "LEONARDO DA SILVA CORRÊA", "LORENA MIDLEY PAULETTI", "LUIZA HIGUCHI ROSA",
                "MARI UEDA POSSATO VENANCIO", "MARIA FERNANDA RUIVO ALBIERO", "MARIA LÚCIA LODI PALHARES",
                "MATHEUS BORGES GARRIDO", "MATHEUS CARDOSO LICHMANN", "PEDRO DOS SANTOS FREITAS",
                "RAFAEL DE BARROS VICENTIN", "RAFAELA RAMALHO GUIRELI", "STELLA HOFFMANN FOGAÇA",
                "VALENTINA PALEARI CASSIMIRO", "VÍTOR HENRIQUE MARTINS DE PAULO"
            ]
        };

        function initLibrary(className) {
            const container = document.getElementById('shelf-manager');
            container.innerHTML = '';
            
            const students = studentsByClass[className] || [];
            const booksPerRow = 5;
            const rowsCount = Math.ceil(students.length / booksPerRow);

            for (let i = 0; i < rowsCount; i++) {
                const shelf = document.createElement('div');
                shelf.className = 'shelf-row';
                
                for (let j = 0; j < booksPerRow; j++) {
                    const studentIndex = (i * booksPerRow) + j;
                    if (studentIndex >= students.length) break;

                    const studentName = students[studentIndex];
                    
                    const bookContainer = document.createElement('div');
                    bookContainer.className = 'book-container';
                    
                    bookContainer.innerHTML = `
                        <div class="book-pages"></div>
                        <div class="book-cover" style="background-image: url('${ozCover}')"></div>
                        <span class="student-label">${studentName}</span>
                    `;
                    shelf.appendChild(bookContainer);
                }
                container.appendChild(shelf);
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('unit-menu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function triggerChangeClass() {
            toggleMenu();
            const selector = document.getElementById('class-selector');
            selector.style.display = 'flex';
            selector.style.opacity = '1';
            document.body.classList.add('overflow-hidden');
        }

        function selectClass(className) {
            document.getElementById('display-class').innerText = className;
            const selector = document.getElementById('class-selector');
            selector.style.opacity = '0';
            setTimeout(() => {
                selector.style.display = 'none';
                document.body.classList.remove('overflow-hidden');
            }, 500);
            initLibrary(className);
        }

        window.onload = () => {
            document.body.classList.add('overflow-hidden');
        };
    </script>
</body>
</html>
