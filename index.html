<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4eee1;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Menu de 3 linhas */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2500;
            cursor: pointer;
            background: #4a6741;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .menu-btn div {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        #unit-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 2600;
            transition: 0.4s;
            padding: 80px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        #unit-menu.active { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 2550;
        }

        /* Seletor de Turma Inicial e Re-seleção */
        #class-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            z-index: 4000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            transition: opacity 0.5s ease;
        }
        .class-circle {
            width: 120px; height: 120px;
            background: #4a6741; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.4s; border: 4px solid white; margin: 10px;
        }
        .class-circle:hover { transform: scale(1.1); background: #8eb486; }

        /* Banner */
        .banner {
            position: relative; height: 350px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; overflow: hidden;
        }
        .banner-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            background-size: cover; background-position: center;
            filter: blur(4px) brightness(0.6); transform: scale(1.1); z-index: -1;
        }
        .banner h1 { font-family: 'Cherry Bomb One', cursive; font-size: 3.5rem; text-shadow: 3px 3px 0px #2d4f2a; }

        /* Estante Realista */
        .library-container {
            max-width: 1200px; margin: 40px auto; padding: 20px;
        }
        .shelf-row {
            background: #8b5a2b; /* Cor de madeira */
            border-bottom: 15px solid #5d3a1a;
            border-top: 5px solid #a67c52;
            margin-bottom: 80px;
            padding: 10px 40px 0 40px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 250px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Livro na vertical (Lombada) */
        .book-spine {
            width: 40px;
            height: 210px;
            background: #4a6741;
            border-radius: 2px 5px 5px 2px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: left bottom;
        }

        .spine-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            color: rgba(255,255,255,0.8);
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Tooltip Aluno */
        .student-name {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d4f2a;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 101;
        }

        /* Efeito Hover: Livro abre */
        .book-spine:hover {
            width: 160px;
            height: 230px;
            background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');
            background-size: cover;
            background-position: center;
            transform: translateY(-10px) rotateY(-15deg);
            z-index: 100;
            box-shadow: -10px 10px 20px rgba(0,0,0,0.4);
        }

        .book-spine:hover .spine-text { opacity: 0; }
        .book-spine:hover .student-name { opacity: 1; top: -50px; }

        /* Viewer */
        #viewer-section {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center;
        }
        .viewer-content { background: white; width: 90%; max-width: 800px; height: 85vh; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Menu Hambúrguer -->
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="unit-menu">
        <h2 class="text-2xl font-bold mb-6 text-green-800">Menu</h2>
        <ul class="space-y-4">
            <li class="p-4 hover:bg-green-50 text-green-700 font-bold rounded cursor-pointer border-2 border-green-100 flex items-center gap-3" onclick="triggerChangeClass()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                Trocar Turma
            </li>
        </ul>
    </div>

    <!-- Seletor de Turma -->
    <div id="class-selector">
        <div class="text-center">
            <h2 class="font-bold text-3xl mb-8 text-green-900" style="font-family: 'Cherry Bomb One'">Escolha a Turma</h2>
            <div class="flex flex-wrap justify-center">
                <div class="class-circle" onclick="selectClass('5ºA')"><span>Turma</span><span>5ºA</span></div>
                <div class="class-circle" onclick="selectClass('5ºB')"><span>Turma</span><span>5ºB</span></div>
                <div class="class-circle" onclick="selectClass('5ºC')"><span>Turma</span><span>5ºC</span></div>
            </div>
        </div>
    </div>

    <header class="banner">
        <div class="banner-bg"></div>
        <h1>Mágico de Oz</h1>
        <p class="mt-2">Unidade Campolim • <span id="display-class" class="font-bold text-yellow-300">...</span> • 2026</p>
    </header>

    <main class="library-container" id="shelf-manager">
        <!-- As 6 estantes serão geradas via JS -->
    </main>

    <section id="viewer-section">
        <div class="viewer-content">
            <div class="flex justify-between items-center p-4 bg-green-800 text-white">
                <span id="viewer-title" class="font-bold">Obra</span>
                <button onclick="closeViewer()" class="bg-red-500 px-3 py-1 rounded">Fechar</button>
            </div>
            <iframe id="viewer-frame" class="w-full h-full" src=""></iframe>
        </div>
    </section>

    <footer class="text-center py-10 text-gray-500 font-bold">
        <p>Projeto de Leitura - Profª Elaine • 2026</p>
    </footer>

    <script>
        const booksData = [
            { id: '1CIa7AGwfkMk1lJO6pRGB5vRiRgi81gb8', color: '#4a6741' },
            { id: '1Yzl6id0zIhUVROSxGOWkBKwE2yaZq-B0', color: '#2c3e50' },
            { id: '16emG3qFuxazoi5yuFoVUIy8LSmm5Re3e', color: '#8e44ad' },
            { id: '1h31wSTwJf_8VzhuarZbPpX3Y5Xvolduz', color: '#d35400' },
            { id: '1gmoAH6yxT-333xL4CJJDm9l-0ClGszAa', color: '#c0392b' }
        ];

        function initLibrary() {
            const container = document.getElementById('shelf-manager');
            container.innerHTML = '';
            
            for (let i = 0; i < 6; i++) {
                const shelf = document.createElement('div');
                shelf.className = 'shelf-row';
                
                for (let j = 0; j < 5; j++) {
                    const studentIndex = (i * 5) + j + 1;
                    const bookInfo = booksData[j % booksData.length];
                    
                    const book = document.createElement('div');
                    book.className = 'book-spine';
                    book.style.backgroundColor = bookInfo.color;
                    book.onclick = () => openViewer(`Obra do Aluno ${studentIndex}`, bookInfo.id);
                    
                    book.innerHTML = `
                        <div class="student-name">Aluno ${studentIndex}</div>
                        <div class="spine-text">PROJETO MÁGICO DE OZ</div>
                    `;
                    shelf.appendChild(book);
                }
                container.appendChild(shelf);
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('unit-menu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function triggerChangeClass() {
            toggleMenu();
            const selector = document.getElementById('class-selector');
            selector.style.display = 'flex';
            selector.style.opacity = '1';
            document.body.classList.add('overflow-hidden');
        }

        function selectClass(className) {
            document.getElementById('display-class').innerText = className;
            const selector = document.getElementById('class-selector');
            selector.style.opacity = '0';
            setTimeout(() => {
                selector.style.display = 'none';
                document.body.classList.remove('overflow-hidden');
            }, 500);
            initLibrary();
        }

        function openViewer(title, fileId) {
            const viewer = document.getElementById('viewer-section');
            const frame = document.getElementById('viewer-frame');
            document.getElementById('viewer-title').innerText = title;
            frame.src = `https://drive.google.com/file/d/${fileId}/preview`;
            viewer.style.display = 'flex';
            document.body.classList.add('overflow-hidden');
        }

        function closeViewer() {
            document.getElementById('viewer-section').style.display = 'none';
            document.getElementById('viewer-frame').src = '';
            document.body.classList.remove('overflow-hidden');
        }

        window.onload = () => {
            document.body.classList.add('overflow-hidden');
        };

        initLibrary();
    </script>
</body>
</html>
