<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&family=Playfair+Display:wght@700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #eaddca;
            color: #333;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Seletor de Turma Inicial */
        #class-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a120e; z-index: 5000; display: flex;
            justify-content: center; align-items: center; transition: opacity 0.6s ease;
        }

        .red-book-custom {
            width: 150px; height: 210px;
            background: linear-gradient(135deg, #a52a2a 0%, #7f1d1d 100%);
            border-radius: 4px 12px 12px 4px; position: relative;
            box-shadow: -5px 0 0 #5a1212, 10px 15px 35px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.3s;
        }
        .red-book-custom:hover { transform: scale(1.05) translateY(-10px); }
        .red-book-title { color: #d4af37; font-family: 'Playfair Display', serif; font-size: 2.5rem; }

        /* Sidebar (Menu Lateral) */
        #sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: #2d1b18; color: white; z-index: 6000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding: 40px 20px;
        }
        #sidebar.active { left: 0; }
        
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 5999; display: none;
            backdrop-filter: blur(4px);
        }

        .sidebar-item {
            padding: 15px 20px; margin-bottom: 10px; border-radius: 8px;
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
            font-family: 'Cinzel', serif; border: 1px solid transparent;
        }
        .sidebar-item:hover { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; color: #d4af37; }

        /* Icone do Menu */
        .menu-icon {
            position: fixed; top: 25px; left: 25px; z-index: 4500;
            cursor: pointer; background: rgba(0,0,0,0.5); padding: 12px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s; display: none;
        }
        .menu-icon:hover { background: #d4af37; border-color: #fff; }

        /* ESTANTE */
        .library-wrapper { 
            max-width: 1400px; 
            margin: 40px auto; 
            padding: 0 40px; 
            opacity: 0; 
            transition: 0.8s; 
            flex-grow: 1; 
        }
        .library-wrapper.visible { opacity: 1; }
        
        .bookcase { 
            background-color: #3e2723;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            border: 22px solid #2d1b18; 
            border-radius: 8px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 150px rgba(0,0,0,0.5);
        }

        .shelf-row {
            padding: 60px 60px 100px 60px; 
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 50px 40px; 
            border-bottom: 35px solid #2d1b18; 
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-color: #4e342e;
        }

        .shelf-row::after {
            content: '';
            position: absolute;
            bottom: -35px;
            left: 0;
            right: 0;
            height: 18px;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .book-item { width: 130px; height: 190px; position: relative; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin: 0 auto; }
        .book-item:hover { transform: translateY(-25px) scale(1.1); z-index: 50; }
        
        .book-cover-small {
            width: 100%; height: 100%; border-radius: 2px 6px 6px 2px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.7);
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 15px; text-align: center; border-left: 7px solid #4a0e0e; overflow: hidden;
            background-image: linear-gradient(rgba(127, 29, 29, 0.85), rgba(90, 18, 18, 0.85)), url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');
            background-size: cover; background-position: center;
        }

        .small-name-gold {
            color: #f3e5ab; font-family: 'Playfair Display', serif; font-size: 0.7rem;
            font-weight: bold; line-height: 1.4; text-shadow: 1px 1px 4px rgba(0,0,0,1);
        }

        .student-name-tag {
            position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            width: 160px; font-size: 0.75rem; font-weight: bold; color: #fff;
            text-align: center; text-transform: uppercase; text-shadow: 2px 2px 4px #000;
            background: rgba(0, 0, 0, 0.65); padding: 7px 5px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* MODAL E LIVRO 3D */
        #book-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; display: none;
            justify-content: center; align-items: center; perspective: 2000px;
            backdrop-filter: blur(10px);
        }

        .book-container {
            width: 400px; height: 550px; position: relative; transform-style: preserve-3d;
            transition: transform 0.8s ease; cursor: pointer;
        }

        .cover-main {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0;
            background: linear-gradient(135deg, #8b0000 0%, #5a1212 100%) !important;
            z-index: 100; transform-origin: left; border-radius: 0 10px 10px 0;
            transition: transform 1s ease, opacity 0.5s;
            border-left: 15px solid #4a0e0e; padding: 40px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            backface-visibility: hidden; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        
        .book-container.open .cover-main { transform: rotateY(-160deg); opacity: 0; pointer-events: none; }

        .book-inner-pages {
            position: absolute; width: 800px; height: 100%; 
            left: 50%; top: 0; transform: translateX(-50%);
            display: flex; opacity: 0; transition: 0.6s ease;
            z-index: 50; pointer-events: none;
        }
        
        .book-container.open .book-inner-pages { opacity: 1; transition-delay: 0.3s; pointer-events: auto; }

        .page-base {
            width: 400px; height: 100%; background: #fdfaf3; padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
            position: relative;
        }
        .page-left { border-radius: 5px 0 0 5px; background: linear-gradient(to right, #e8dfcc, #fdfaf3 10%); border-right: 1px solid rgba(0,0,0,0.1); }
        .page-right { border-radius: 0 5px 5px 0; background: linear-gradient(to left, #e8dfcc, #fdfaf3 10%); }

        /* Container da Imagem com Lupa */
        .work-image-container {
            position: relative;
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .work-image { 
            width: 100%; 
            max-height: 80%; 
            object-fit: contain; 
            border: 10px solid white; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); 
            cursor: zoom-in;
            transition: 0.3s;
        }
        .work-image:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Estilo da Lupa */
        .zoom-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(180, 83, 9, 0.9); /* amber-700 */
            color: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.2);
            animation: pulse-slow 2s infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* ZOOM DA IMAGEM */
        .image-zoom-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .zoomed-image {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border: 5px solid white;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: zoom-out;
        }

        /* Botão apenas com a seta, flutuando no canto superior esquerdo */
        .back-to-shelf-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            background: #d4af37;
            color: #2d1b18;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10002;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .back-to-shelf-btn:hover {
            background: white;
            transform: scale(1.1) rotate(-10deg);
        }

        .close-btn {
            position: fixed; top: 30px; right: 30px; color: white; font-size: 1.5rem;
            cursor: pointer; z-index: 10000; background: rgba(255,255,255,0.1); width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg); }

        footer {
            background-color: #2d1b18;
            color: #d4af37;
            padding: 50px 20px;
            border-top: 10px solid #3e2723;
            margin-top: auto;
            font-family: 'Quicksand', sans-serif;
        }
        .footer-content {
            max-width: 1200px; 
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .footer-logo {
            width: 110px; 
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.8; 
            transition: 0.3s;
        }
        .footer-logo:hover { opacity: 1; }

        @media (max-width: 900px) {
            .book-container { width: 300px; height: 420px; }
            .book-inner-pages { width: 600px; }
            .page-base { width: 300px; }
            .shelf-row { grid-template-columns: repeat(3, 1fr); padding: 30px 15px 70px 15px; }
            .footer-content { flex-direction: column; gap: 20px; text-align: center; }
            .library-wrapper { padding: 0 10px; }
            .banner { height: auto; padding: 40px 20px; }
            .banner-content { flex-direction: column; gap: 30px; }
            .banner-logo-placeholder { display: none; }
            .back-to-shelf-btn { top: 15px; left: 15px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Overlay de Zoom -->
    <div id="zoom-overlay" class="image-zoom-overlay">
        <img id="zoomed-img-content" class="zoomed-image" src="" alt="Imagem Ampliada" onclick="closeZoom()">
        <!-- Botão Minimalista: Apenas Seta -->
        <div class="back-to-shelf-btn" onclick="returnToShelf()" title="Voltar para a Estante">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </div>
    </div>

    <!-- Menu Lateral -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="sidebar">
        <h2 class="text-2xl font-bold mb-8 border-b border-amber-500/30 pb-4" style="font-family: 'Cherry Bomb One'">Trocar Turma</h2>
        <div class="sidebar-item" onclick="changeClass('5ºA')">Turma 5ºA</div>
        <div class="sidebar-item" onclick="changeClass('5ºB')">Turma 5ºB</div>
        <div class="sidebar-item" onclick="changeClass('5ºC')">Turma 5ºC</div>
        <div class="mt-20 opacity-50 text-xs uppercase tracking-widest text-center">Unidade Campolim</div>
    </div>

    <div class="menu-icon" id="main-menu-icon" onclick="openSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <!-- Modal do Livro -->
    <div id="book-modal">
        <div class="close-btn" onclick="closeBook()">✕</div>
        <div class="book-container" id="book-element">
            <div class="cover-main" id="modal-cover-front" onclick="toggleBookOpen(event)">
                <div class="main-title-gold text-[#d4af37] text-lg tracking-[4px]" style="font-family: 'Cinzel'">MÁGICO DE OZ</div>
                <div id="cover-name-text" class="main-name-gold text-[#f3e5ab] text-3xl font-bold" style="font-family: 'Playfair Display'"></div>
                <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-16 h-auto mb-4 filter brightness-0 invert" alt="Logo">
                <div class="text-[#d4af37] text-xs animate-pulse">Clique para folhear</div>
            </div>

            <div class="book-inner-pages" id="inner-pages">
                <div class="page-base page-left">
                    <h2 id="inner-student-name" class="text-2xl font-bold text-amber-900 mb-2 text-center" style="font-family: 'Playfair Display'"></h2>
                    <div class="w-12 h-1 bg-amber-400 mb-6 rounded-full"></div>
                    <p class="text-amber-800 italic text-sm text-center">"Não há lugar como o nosso lar."</p>
                </div>
                <div class="page-base page-right">
                    <div class="work-image-container" onclick="openZoom(document.getElementById('work-img').src)">
                        <img id="work-img" src="" class="work-image" alt="Poema do Aluno">
                        <!-- Ícone de Lupa -->
                        <div class="zoom-indicator">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                            </svg>
                        </div>
                    </div>
                    <p class="text-[10px] text-amber-600 mt-4 uppercase tracking-widest font-bold">Clique no poema para ampliar</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Seleção Inicial -->
    <div id="class-selector">
        <div class="text-center">
            <h1 class="text-white text-5xl font-bold mb-12" style="font-family: 'Cherry Bomb One';">Selecione a Turma</h1>
            <div class="flex gap-10 justify-center">
                <div class="red-book-custom" onclick="startApp('5ºA')"><span class="red-book-title">5ºA</span></div>
                <div class="red-book-custom" onclick="startApp('5ºB')"><span class="red-book-title">5ºB</span></div>
                <div class="red-book-custom" onclick="startApp('5ºC')"><span class="red-book-title">5ºC</span></div>
            </div>
        </div>
    </div>

    <!-- Banner Superior -->
    <header class="banner h-[300px] bg-amber-900 text-white relative shadow-xl border-b-8 border-[#2d1b18] flex items-center px-8 overflow-hidden">
        <div class="absolute inset-0 opacity-40 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF')"></div>
        
        <div class="relative z-10 w-full flex items-center justify-between max-w-7xl mx-auto banner-content">
            <div class="flex-shrink-0">
                <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-24 h-auto filter brightness-0 invert" alt="Logo Colégio">
            </div>

            <div class="text-center flex-grow px-4">
                <h1 class="text-6xl font-bold leading-tight" style="font-family: 'Cherry Bomb One'; text-shadow: 4px 4px 0px #3e2723;">Estante Virtual</h1>
                <div class="flex flex-col items-center mt-2">
                    <div class="w-24 h-1 bg-amber-500/50 mb-3 rounded-full"></div>
                    <p class="bg-amber-800/90 border border-amber-600/50 px-8 py-2 rounded-full text-sm font-bold tracking-[0.2em] uppercase shadow-lg">
                        Mágico de Oz • Campolim • <span id="current-class-label"></span>
                    </p>
                </div>
            </div>

            <div class="flex-shrink-0 w-24 banner-logo-placeholder"></div>
        </div>
    </header>

    <!-- Área da Estante -->
    <div class="library-wrapper" id="lib-view">
        <div class="bookcase" id="shelf-container"></div>
    </div>

    <footer>
        <div class="footer-content">
            <img src="https://lh3.googleusercontent.com/d/1E49ixG8NWq1CestH_lJJiPxTFzyZT3xb" class="footer-logo" alt="Logo TE Rodapé">
            <div class="text-right">
                <p class="text-lg font-bold uppercase tracking-[3px]" style="font-family: 'Cinzel'">Colégio Ser</p>
                <p class="text-[10px] opacity-60 uppercase tracking-widest mb-2">Unidade Campolim</p>
                <div class="w-12 h-0.5 bg-amber-600 ml-auto mb-2"></div>
                <p class="text-xs">Estante Virtual 5º Ano • <span id="footer-date"></span></p>
            </div>
        </div>
    </footer>

    <script>
        const ozCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';
        document.getElementById('footer-date').innerText = new Date().getFullYear();

        const mediaConfig = {
            "ALÍCIA CALIXTO FALQUEIRO": { 
                work: "https://lh3.googleusercontent.com/d/1MYXVZ2T4t2XEyFYcOS5pcCBkTIR_mSGT" 
            },
            "ANGELO BRUGINSKI SCUDERI": { work: ozCover }
        };
        
        const studentsData = {
            '5ºA': ["ALÍCIA CALIXTO FALQUEIRO", "ANGELO BRUGINSKI SCUDERI", "ARTHUR KENJI NAKAGAWA", "BERNARDO CHRISTIAN RIBEIRO FREIRE", "CAROLINA DE QUEIROZ MOREIRA", "CECÍLIA LEONEL NALESSO", "DANIEL SALVARANI GUARINHO", "EDUARDO FANTAZZINI GRANDISOLI", "EMI SAKIHAMA", "FERNANDA AKARI KIMURA", "GAEL FARHA CONDE", "GUSTAVO DE SOUZA SAMPAIO", "GUSTAVO SILVA E SOUZA", "HELENA HERINGER ROCHA SAD", "HELOISA ROSA DE SOUZA BARRETO", "JÚLIA ROSÁTI SILVA", "LORENA DE CARVALHO SALLES", "LORENZO AMARAL FURIGO CARDOSO", "LUCAS CASTELLI ALBUQUERQUE", "LUCAS OLIVEIRA MAIA", "LUCAS TADEU MUNIZ DA SILVA", "LUIZA BELLOTTO BARRETTO", "MARINA SARTORETO FERNANDES", "PEDRO RIBEIRO DE OLIVEIRA", "RAFAEL WATANABE SOUZA BARBIERI", "RAFAELLA MUOIO POLIDO", "THEO BRITO SEGAMARCHI"],
            '5ºB': ["ALICE BELLUCCI ASCENCIO", "ALICE DE FREITAS OLHIER", "ANTONELLA JULIO VETTORAZZO CHIESA REY", "ARTHUR CORDEIRO PIZA", "BERNARDO VENTURA SÃO PIETRO", "CAROLINA SAES RUIZ", "CATARINA MARQUES RAMOS", "CECÍLIA ZAN BARROSO", "EDUARDO FRANCO TOLEDO PINTO", "ENZO ANDRADE ALVES", "FELIPE GUIMARÃES DE SOUZA", "GABRIEL YUZUI VICECONTI", "GIOVANI DIEZEL MUNHOZ", "GIULIA REZENDE PASSOS", "ISABELA AGOSTINELI TRIDAPALLI", "ISABELLA BOAVENTURA GOMES DA SILVA OLIVEIRA", "LARISSA DAMASCENO BRUDER SANTINI", "LÍVIA MAXCARENHAS BEDULLI", "LORENZO ATTIÊ BRUNI", "LUCAS BERNARDO MATUTINO DE OLIVEIRA", "MARCELLA TARABORELLI LIMONGELLI", "MARCELO SOUZA VARCA", "MARCUS MIGUEL CORDEIRO DE MORAES", "MARIA EDUARDA LEMOS LIMA", "MARIAH ANTONELLA MACIEL MAESTÁ", "MATEUS CARVALHO MADEIRA", "MATHEUS DA SILVA VACCARO", "PEDRO CAMPOS VIZCARRA ZUNIGA"],
            '5ºC': ["ALICE VIEIRA ESTEVES", "BEATRIZ PAZINI SOARES", "BERNARDO MICHELETTI FRANCISCO", "CECÍLIA SALCEDO FERNANDES", "CLARA COSTA RIBAS FRAMIL SANCHES", "DAVI CARVALHO DE VASCELOS", "ENRICO FESTINO MARTORELLI", "GABRIEL MAMEDE DE ALMEIDA FERREIRA", "GABRIEL RIBEIRO DA SILVA", "GIOVANNA DA SILVA PRESTES", "GIOVANNA LA TORRE MARTINS", "GIULIA VIEIRA SACCOMANO", "JOÃO LUCCA SANTI SILVA", "JOSÉ FORTE PESSOA JUNIOR", "LAURA AGRA DE MORAES", "LEONARDO DA SILVA CORRÊA", "LORENA MIDLEY PAULETTI", "LUIZA HIGUCHI ROSA", "MARI UEDA POSSATO VENANCIO", "MARIA FERNANDA RUIVO ALBIERO", "MARIA LÚCIA LODI PALHARES", "MATHEUS BORGES GARRIDO", "MATHEUS CARDOSO LICHMANN", "PEDRO DOS SANTOS FREITAS", "RAFAEL DE BARROS VICENTIN", "RAFAELA RAMALHO GUIRELI", "STELLA HOFFMANN FOGAÇA", "VALENTINA PALEARI CASSIMIRO", "VÍTOR HENRIQUE MARTINS DE PAULO"]
        };

        function startApp(className) {
            document.getElementById('class-selector').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('class-selector').style.display = 'none';
                document.getElementById('main-menu-icon').style.display = 'block';
                renderClass(className);
                document.body.classList.remove('overflow-hidden');
            }, 600);
        }

        function renderClass(className) {
            document.getElementById('current-class-label').innerText = className;
            document.getElementById('lib-view').classList.add('visible');
            renderShelf(className);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebar-overlay').style.display = 'block';
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        function changeClass(className) {
            closeSidebar();
            renderClass(className);
        }

        function renderShelf(className) {
            const container = document.getElementById('shelf-container');
            container.innerHTML = '';
            const students = studentsData[className];
            const perRow = 5; 
            
            for(let i=0; i < students.length; i+=perRow) {
                const row = document.createElement('div');
                row.className = 'shelf-row';
                students.slice(i, i+perRow).forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.onclick = () => openModal(name);
                    item.innerHTML = `
                        <div class="book-cover-small"><div class="small-name-gold">${name}</div></div>
                        <div class="student-name-tag" title="${name}">${name}</div>
                    `;
                    row.appendChild(item);
                });
                container.appendChild(row);
            }
        }

        function openModal(name) {
            const modal = document.getElementById('book-modal');
            const book = document.getElementById('book-element');
            const img = document.getElementById('work-img');
            
            document.getElementById('cover-name-text').innerText = name;
            document.getElementById('inner-student-name').innerText = name;
            
            const config = mediaConfig[name];
            img.src = config ? config.work : ozCover;
            
            modal.style.display = 'flex';
            book.classList.remove('open');
            book.style.transform = "rotateX(5deg)";
        }

        function toggleBookOpen(e) {
            const book = document.getElementById('book-element');
            if (!book.classList.contains('open')) {
                book.classList.add('open');
                book.style.transform = "rotateX(0deg)";
            }
        }

        function closeBook() {
            const book = document.getElementById('book-element');
            book.classList.remove('open');
            book.style.transform = "rotateX(5deg)";
            setTimeout(() => { document.getElementById('book-modal').style.display = 'none'; }, 850);
        }

        function openZoom(src) {
            const overlay = document.getElementById('zoom-overlay');
            const zoomImg = document.getElementById('zoomed-img-content');
            zoomImg.src = src;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeZoom() {
            document.getElementById('zoom-overlay').style.display = 'none';
            document.body.style.overflow = '';
        }

        function returnToShelf() {
            closeZoom();
            closeBook();
            setTimeout(() => {
                const shelf = document.getElementById('lib-view');
                if (shelf) {
                    window.scrollTo({
                        top: shelf.offsetTop - 50,
                        behavior: 'smooth'
                    });
                }
            }, 300);
        }
    </script>
</body>
</html>
