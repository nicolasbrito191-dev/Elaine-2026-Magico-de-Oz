<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #fdf5e6;
            --wood-dark: #1f1209;
            --wood-medium: #3e2723;
            --wood-light: #5d4037;
            --magic-red: #8b0000;
            --magic-red-dark: #4a0e0e;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4ecd8;
            background-image: radial-gradient(circle at center, #f4ecd8 0%, #dfd3b6 100%);
            color: #333;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Títulos Mágicos */
        .font-magic { font-family: 'Cinzel', serif; }
        .font-classic { font-family: 'Playfair Display', serif; }

        /* Animações e Efeitos Globais */
        .smooth-transition { transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .hover-glow:hover { text-shadow: 0 0 10px rgba(212, 175, 55, 0.8); }

        /* --- TELA INICIAL (SELETOR DE TURMA) --- */
        #class-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a1610 0%, #0a0503 100%);
            z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s;
        }

        .floating-books-container {
            display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; padding: 20px;
        }

        .magic-tome {
            width: 140px; height: 200px;
            background: linear-gradient(135deg, var(--magic-red) 0%, var(--magic-red-dark) 100%);
            border-radius: 5px 15px 15px 5px; position: relative;
            box-shadow: -6px 0 0 #3a0808, inset 4px 0 10px rgba(255,255,255,0.2), 0 20px 40px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3); cursor: pointer;
            will-change: transform;
            animation: float 4s ease-in-out infinite;
        }
        .magic-tome:nth-child(2) { animation-delay: 1s; }
        .magic-tome:nth-child(3) { animation-delay: 2s; }

        .magic-tome:hover {
            transform: scale(1.1) translateY(-10px) !important;
            box-shadow: -6px 0 0 #3a0808, 0 0 30px rgba(212, 175, 55, 0.6);
            animation-play-state: paused;
        }

        .tome-title { color: var(--gold); font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        #sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(31, 18, 9, 0.95); backdrop-filter: blur(10px);
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            color: white; z-index: 6000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.7);
            padding: 50px 30px;
        }
        #sidebar.active { left: 0; }
        
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
            z-index: 5999; display: none; transition: opacity 0.3s;
        }

        .sidebar-item {
            padding: 16px 24px; margin-bottom: 12px; border-radius: 12px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            cursor: pointer; transition: 0.3s;
            border-left: 3px solid transparent; letter-spacing: 2px;
        }
        .sidebar-item:hover { 
            background: rgba(212, 175, 55, 0.1); 
            border-left: 3px solid var(--gold); 
            color: var(--gold); 
            transform: translateX(10px);
        }

        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 4500;
            background: rgba(31, 18, 9, 0.8); backdrop-filter: blur(5px);
            padding: 12px; border-radius: 50%; border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none; color: var(--gold);
        }
        .menu-btn:hover { background: var(--gold); color: var(--wood-dark); transform: rotate(90deg); }

        /* --- ESTANTE --- */
        .library-wrapper { 
            max-width: 1600px; width: 95%; margin: -50px auto 60px; padding: 0 20px; 
            opacity: 0; transform: translateY(30px); transition: 1s ease-out; 
            flex-grow: 1; position: relative; z-index: 20;
        }
        .library-wrapper.visible { opacity: 1; transform: translateY(0); }
        
        .bookcase { 
            background-color: var(--wood-medium);
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); 
            border: 15px solid var(--wood-dark); 
            border-radius: 12px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.8);
            padding-top: 20px;
        }

        .shelf-row {
            padding: 40px 30px 60px 30px; 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px 40px;
            border-bottom: 25px solid var(--wood-dark); 
            position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%);
        }

        .shelf-row::after {
            content: ''; position: absolute; bottom: -25px; left: 0; right: 0;
            height: 12px; background: rgba(255,255,255,0.05); pointer-events: none;
        }

        /* --- LIVROS NA ESTANTE --- */
        .book-item { 
            width: 120px; height: 180px; position: relative; cursor: pointer; 
            perspective: 1000px; will-change: transform;
        }
        
        .book-cover-small {
            width: 100%; height: 100%; border-radius: 3px 8px 8px 3px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6), inset 2px 0 5px rgba(255,255,255,0.2);
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 15px; text-align: center; border-left: 6px solid var(--magic-red-dark); 
            overflow: hidden; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-image: linear-gradient(rgba(74, 14, 14, 0.8), rgba(45, 9, 9, 0.9)), url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');
            background-size: cover; background-position: center;
            transform-origin: left center;
        }

        .book-item:hover .book-cover-small { 
            transform: translateY(-15px) rotateY(-10deg) scale(1.05); 
            box-shadow: 15px 25px 30px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.4); 
            z-index: 50; 
        }

        .small-name-gold {
            color: var(--gold-light); font-size: 0.75rem; line-height: 1.3;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); z-index: 2;
        }

        .student-name-tag {
            position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%);
            width: max-content; max-width: 150px; font-size: 0.65rem; color: #aaa;
            text-align: center; text-transform: uppercase; letter-spacing: 1px;
            opacity: 0; transition: 0.3s ease; pointer-events: none;
            background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px;
        }
        .book-item:hover .student-name-tag { opacity: 1; transform: translateX(-50%) translateY(-5px); color: var(--gold); }

        /* --- MODAL E LIVRO 3D --- */
        #book-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 2, 0.9); backdrop-filter: blur(8px);
            z-index: 9000; display: none; justify-content: center; align-items: center; 
            perspective: 2500px;
        }

        .book-container {
            width: 420px; height: 580px; position: relative; transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer;
        }

        .cover-main {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0;
            background: linear-gradient(135deg, var(--magic-red) 0%, #3a0808 100%);
            z-index: 100; transform-origin: left; border-radius: 0 12px 12px 0;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s;
            border-left: 18px solid var(--magic-red-dark); padding: 50px 30px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            backface-visibility: hidden; box-shadow: 20px 0 50px rgba(0,0,0,0.7), inset 5px 0 10px rgba(255,255,255,0.1);
        }
        
        .book-container.open .cover-main { transform: rotateY(-160deg); opacity: 0; pointer-events: none; }

        .book-inner-pages {
            position: absolute; width: 840px; height: 100%; 
            left: 50%; top: 0; transform: translateX(-50%);
            display: flex; opacity: 0; transition: 0.6s ease;
            z-index: 50; pointer-events: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        
        .book-container.open .book-inner-pages { opacity: 1; transition-delay: 0.2s; pointer-events: auto; }

        .page-base {
            width: 420px; height: 100%; background-color: #f4ecd8;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .page-left { 
            border-radius: 5px 0 0 5px; 
            background-image: linear-gradient(to right, rgba(0,0,0,0.1) 0%, transparent 10%), url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border-right: 1px solid rgba(0,0,0,0.1); 
        }
        .page-right { 
            border-radius: 0 5px 5px 0; 
            background-image: linear-gradient(to left, rgba(0,0,0,0.1) 0%, transparent 10%), url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        /* --- VISUALIZADOR DE IMAGEM --- */
        .work-image-container {
            position: relative; width: 100%; height: auto; display: flex;
            justify-content: center; align-items: center;
            padding: 10px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }

        .work-image { 
            width: 100%; max-height: 400px; object-fit: contain; cursor: zoom-in;
        }
        
        .work-image-container:hover { transform: scale(1.02) translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .zoom-indicator {
            position: absolute; bottom: -15px; right: -15px;
            background: var(--gold); color: #fff; padding: 12px; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); pointer-events: none;
            border: 2px solid white; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* --- ZOOM OVERLAY --- */
        .image-zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10001; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .image-zoom-overlay.show { opacity: 1; }

        .zoomed-image {
            max-width: 90%; max-height: 90%; object-fit: contain;
            border: 8px solid white; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 4px; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-zoom-overlay.show .zoomed-image { transform: scale(1); }

        /* Botões Minimalistas */
        .btn-circle {
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; backdrop-filter: blur(4px);
        }
        .btn-circle:hover { background: var(--gold); color: var(--wood-dark); transform: scale(1.1); border-color: transparent; }

        .btn-close-modal { position: absolute; top: 30px; right: 40px; z-index: 10000; }
        .btn-back-zoom { position: absolute; top: 30px; left: 40px; z-index: 10002; }

        /* --- HEADER & FOOTER --- */
        header {
            background: linear-gradient(to right, var(--wood-dark), #4a2c21);
            position: relative; overflow: hidden;
            border-bottom: 4px solid var(--gold);
        }
        .header-bg {
            position: absolute; inset: 0; opacity: 0.3; background-size: cover; background-position: center;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            mix-blend-mode: overlay;
        }

        footer {
            background-color: var(--wood-dark); color: var(--gold); padding: 40px 20px;
            border-top: 2px solid rgba(212, 175, 55, 0.2); margin-top: auto;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 900px) {
            .book-container { width: 320px; height: 460px; }
            .book-inner-pages { width: 640px; flex-direction: column; height: auto; top: 50%; transform: translate(-50%, -50%); overflow-y: auto; max-height: 90vh; border-radius: 10px;}
            .page-base { width: 100%; height: auto; min-height: 460px; }
            .page-left { border-radius: 10px 10px 0 0; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); }
            .page-right { border-radius: 0 0 10px 10px; }
            .shelf-row { gap: 30px 20px; padding: 30px 15px 50px; }
            .book-item { width: 100px; height: 150px; }
            header h1 { font-size: 3rem !important; }
            .library-wrapper { margin-top: -30px; padding: 0 10px; }
            .btn-close-modal, .btn-back-zoom { top: 15px; width: 40px; height: 40px; }
            .btn-close-modal { right: 15px; } .btn-back-zoom { left: 15px; }
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- OVERLAY DE ZOOM DA IMAGEM -->
    <div id="zoom-overlay" class="image-zoom-overlay" onclick="closeZoom(event)">
        <div class="btn-circle btn-back-zoom" title="Voltar" onclick="closeZoom(event)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </div>
        <img id="zoomed-img-content" class="zoomed-image" src="" alt="Trabalho Ampliado">
    </div>

    <!-- MENU LATERAL -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="sidebar">
        <h2 class="text-3xl font-magic text-center mb-10 text-[var(--gold)] border-b border-[#d4af37]/30 pb-4">As Turmas</h2>
        <div class="sidebar-item font-classic text-xl" onclick="changeClass('5ºA')">Turma 5ºA</div>
        <div class="sidebar-item font-classic text-xl" onclick="changeClass('5ºB')">Turma 5ºB</div>
        <div class="sidebar-item font-classic text-xl" onclick="changeClass('5ºC')">Turma 5ºC</div>
        
        <div class="absolute bottom-10 left-0 w-full text-center opacity-40">
            <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-16 mx-auto filter brightness-0 invert opacity-50 mb-3" alt="Logo">
            <p class="text-xs uppercase tracking-[3px]">Unidade Campolim</p>
        </div>
    </div>

    <!-- BOTÃO DO MENU -->
    <div class="menu-btn smooth-transition" id="main-menu-icon" onclick="openSidebar()" title="Trocar Turma">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <!-- MODAL DO LIVRO 3D -->
    <div id="book-modal">
        <div class="btn-circle btn-close-modal" onclick="closeBook()" title="Fechar Livro">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>
        
        <div class="book-container" id="book-element">
            <!-- Capa do Livro -->
            <div class="cover-main" onclick="toggleBookOpen(event)">
                <div class="font-magic text-[var(--gold)] text-xl tracking-[5px] mt-4">MÁGICO DE OZ</div>
                <div class="flex-grow flex items-center justify-center w-full">
                    <div id="cover-name-text" class="font-classic text-[var(--gold-light)] text-3xl font-bold leading-snug"></div>
                </div>
                <div class="mb-6 flex flex-col items-center">
                    <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-12 h-auto opacity-70 filter brightness-0 invert mb-6" alt="Logo">
                    <div class="text-[var(--gold)] text-xs uppercase tracking-widest animate-pulse border border-[var(--gold)] rounded-full px-4 py-1">Abrir Livro</div>
                </div>
            </div>

            <!-- Páginas Internas -->
            <div class="book-inner-pages" id="inner-pages">
                <!-- Página Esquerda (Nome e Citação) -->
                <div class="page-base page-left">
                    <div class="w-full flex flex-col items-center justify-center h-full">
                        <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-16 opacity-20 mb-8" alt="Watermark">
                        <h2 id="inner-student-name" class="text-3xl font-classic font-bold text-[#3e2723] mb-6 text-center px-4 leading-tight"></h2>
                        <div class="w-16 h-[2px] bg-[var(--gold)] mb-8"></div>
                        <p class="font-classic italic text-[#5d4037] text-lg text-center px-8">"Não há lugar como o nosso lar."</p>
                    </div>
                </div>
                
                <!-- Página Direita (Trabalho) -->
                <div class="page-base page-right">
                    <div class="w-full flex flex-col items-center justify-center h-full">
                        <div class="work-image-container group" onclick="openZoom(document.getElementById('work-img').src)">
                            <img id="work-img" src="" class="work-image" alt="Poema do Aluno" loading="lazy">
                            <div class="zoom-indicator group-hover:bg-white group-hover:text-[var(--gold)] transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                                </svg>
                            </div>
                        </div>
                        <p class="text-[10px] text-[#8b0000] mt-6 uppercase tracking-[2px] font-bold opacity-70">Clique na folha para ampliar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SELETOR INICIAL DE TURMAS -->
    <div id="class-selector">
        <h1 class="text-white text-5xl md:text-6xl font-magic mb-16 text-center tracking-widest text-[var(--gold)] hover-glow smooth-transition">Escolha o Caminho</h1>
        <div class="floating-books-container">
            <div class="magic-tome" onclick="startApp('5ºA')"><span class="tome-title font-magic">5ºA</span></div>
            <div class="magic-tome" onclick="startApp('5ºB')"><span class="tome-title font-magic">5ºB</span></div>
            <div class="magic-tome" onclick="startApp('5ºC')"><span class="tome-title font-magic">5ºC</span></div>
        </div>
        <p class="text-white/50 mt-16 font-classic italic">Colégio Ser • Estante Virtual</p>
    </div>

    <!-- CABEÇALHO / BANNER -->
    <header class="h-[350px] flex items-center justify-center relative shadow-2xl">
        <div class="header-bg"></div>
        <div class="relative z-10 w-full max-w-6xl mx-auto px-6 flex flex-col items-center text-center">
            <img src="https://lh3.googleusercontent.com/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI" class="w-20 h-auto filter brightness-0 invert opacity-80 mb-6" alt="Logo Colégio">
            <h1 class="text-5xl md:text-7xl font-magic text-white mb-4 drop-shadow-lg" style="text-shadow: 0 4px 15px rgba(0,0,0,0.5);">Estante Virtual</h1>
            <div class="flex items-center gap-4 mt-2">
                <div class="h-[1px] w-12 bg-[var(--gold)]"></div>
                <p class="bg-[var(--wood-dark)]/80 backdrop-blur border border-[var(--gold)]/50 text-[var(--gold-light)] px-6 py-2 rounded-full text-sm font-bold tracking-[0.2em] uppercase shadow-xl">
                    Mágico de Oz • <span id="current-class-label" class="text-[var(--gold)]"></span>
                </p>
                <div class="h-[1px] w-12 bg-[var(--gold)]"></div>
            </div>
        </div>
    </header>

    <!-- ÁREA DA ESTANTE -->
    <main class="library-wrapper" id="lib-view">
        <div class="bookcase" id="shelf-container">
            <!-- Prateleiras geradas por JS -->
        </div>
    </main>

    <!-- RODAPÉ -->
    <footer>
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <img src="https://lh3.googleusercontent.com/d/1E49ixG8NWq1CestH_lJJiPxTFzyZT3xb" class="w-28 opacity-60 hover:opacity-100 smooth-transition filter brightness-0 invert" alt="Logo TE">
            <div class="text-center md:text-right">
                <p class="text-xl font-magic tracking-[4px] text-white">Colégio Ser</p>
                <p class="text-xs opacity-50 uppercase tracking-[2px] mt-1 mb-3">Unidade Campolim</p>
                <div class="w-full md:w-24 h-[1px] bg-[var(--gold)]/30 mx-auto md:ml-auto md:mr-0 mb-3"></div>
                <p class="text-xs font-classic opacity-70">Projeto de Leitura • <span id="footer-date"></span></p>
            </div>
        </div>
    </footer>

    <script>
        const defaultCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';
        document.getElementById('footer-date').innerText = new Date().getFullYear();

        // Configuração de trabalhos específicos
        const mediaConfig = {
            "ALÍCIA CALIXTO FALQUEIRO": { work: "https://lh3.googleusercontent.com/d/1MYXVZ2T4t2XEyFYcOS5pcCBkTIR_mSGT" }
        };
        
        // Base de Dados dos Alunos (Incluindo Scarlett Grace Lima Custodio no 5ºA)
        const studentsData = {
            '5ºA': ["ALÍCIA CALIXTO FALQUEIRO", "ANGELO BRUGINSKI SCUDERI", "ARTHUR KENJI NAKAGAWA", "BERNARDO CHRISTIAN RIBEIRO FREIRE", "CAROLINA DE QUEIROZ MOREIRA", "CECÍLIA LEONEL NALESSO", "DANIEL SALVARANI GUARINHO", "EDUARDO FANTAZZINI GRANDISOLI", "EMI SAKIHAMA", "FERNANDA AKARI KIMURA", "GAEL FARHA CONDE", "GUSTAVO DE SOUZA SAMPAIO", "GUSTAVO SILVA E SOUZA", "HELENA HERINGER ROCHA SAD", "HELOISA ROSA DE SOUZA BARRETO", "JÚLIA ROSÁTI SILVA", "LORENA DE CARVALHO SALLES", "LORENZO AMARAL FURIGO CARDOSO", "LUCAS CASTELLI ALBUQUERQUE", "LUCAS OLIVEIRA MAIA", "LUCAS TADEU MUNIZ DA SILVA", "LUIZA BELLOTTO BARRETTO", "MARINA SARTORETO FERNANDES", "PEDRO RIBEIRO DE OLIVEIRA", "RAFAEL WATANABE SOUZA BARBIERI", "RAFAELLA MUOIO POLIDO", "SCARLETT GRACE LIMA CUSTODIO", "THEO BRITO SEGAMARCHI"],
            '5ºB': ["ALICE BELLUCCI ASCENCIO", "ALICE DE FREITAS OLHIER", "ANTONELLA JULIO VETTORAZZO CHIESA REY", "ARTHUR CORDEIRO PIZA", "BERNARDO VENTURA SÃO PIETRO", "CAROLINA SAES RUIZ", "CATARINA MARQUES RAMOS", "CECÍLIA ZAN BARROSO", "EDUARDO FRANCO TOLEDO PINTO", "ENZO ANDRADE ALVES", "FELIPE GUIMARÃES DE SOUZA", "GABRIEL YUZUI VICECONTI", "GIOVANI DIEZEL MUNHOZ", "GIULIA REZENDE PASSOS", "ISABELA AGOSTINELI TRIDAPALLI", "ISABELLA BOAVENTURA GOMES DA SILVA OLIVEIRA", "LARISSA DAMASCENO BRUDER SANTINI", "LÍVIA MAXCARENHAS BEDULLI", "LORENZO ATTIÊ BRUNI", "LUCAS BERNARDO MATUTINO DE OLIVEIRA", "MARCELLA TARABORELLI LIMONGELLI", "MARCELO SOUZA VARCA", "MARCUS MIGUEL CORDEIRO DE MORAES", "MARIA EDUARDA LEMOS LIMA", "MARIAH ANTONELLA MACIEL MAESTÁ", "MATEUS CARVALHO MADEIRA", "MATHEUS DA SILVA VACCARO", "PEDRO CAMPOS VIZCARRA ZUNIGA"],
            '5ºC': ["ALICE VIEIRA ESTEVES", "BEATRIZ PAZINI SOARES", "BERNARDO MICHELETTI FRANCISCO", "CECÍLIA SALCEDO FERNANDES", "CLARA COSTA RIBAS FRAMIL SANCHES", "DAVI CARVALHO DE VASCELOS", "ENRICO FESTINO MARTORELLI", "GABRIEL MAMEDE DE ALMEIDA FERREIRA", "GABRIEL RIBEIRO DA SILVA", "GIOVANNA DA SILVA PRESTES", "GIOVANNA LA TORRE MARTINS", "GIULIA VIEIRA SACCOMANO", "JOÃO LUCCA SANTI SILVA", "JOSÉ FORTE PESSOA JUNIOR", "LAURA AGRA DE MORAES", "LEONARDO DA SILVA CORRÊA", "LORENA MIDLEY PAULETTI", "LUIZA HIGUCHI ROSA", "MARI UEDA POSSATO VENANCIO", "MARIA FERNANDA RUIVO ALBIERO", "MARIA LÚCIA LODI PALHARES", "MATHEUS BORGES GARRIDO", "MATHEUS CARDOSO LICHMANN", "PEDRO DOS SANTOS FREITAS", "RAFAEL DE BARROS VICENTIN", "RAFAELA RAMALHO GUIRELI", "STELLA HOFFMANN FOGAÇA", "VALENTINA PALEARI CASSIMIRO", "VÍTOR HENRIQUE MARTINS DE PAULO"]
        };

        // Funções de Navegação e Estado
        function startApp(className) {
            const selector = document.getElementById('class-selector');
            selector.style.opacity = '0';
            selector.style.visibility = 'hidden';
            
            setTimeout(() => {
                document.getElementById('main-menu-icon').style.display = 'block';
                renderClass(className);
                document.body.classList.remove('overflow-hidden');
            }, 600);
        }

        function renderClass(className) {
            document.getElementById('current-class-label').innerText = className;
            const libView = document.getElementById('lib-view');
            libView.classList.remove('visible');
            
            setTimeout(() => {
                renderShelf(className);
                libView.classList.add('visible');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        function changeClass(className) {
            closeSidebar();
            renderClass(className);
        }

        // Funções da Sidebar
        function openSidebar() {
            document.getElementById('sidebar').classList.add('active');
            const overlay = document.getElementById('sidebar-overlay');
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.opacity = '1', 10);
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            const overlay = document.getElementById('sidebar-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        // Renderização da Estante
        function renderShelf(className) {
            const container = document.getElementById('shelf-container');
            container.innerHTML = '';
            const students = studentsData[className].sort();
            
            // Reduzimos o limite para garantir 5 livros mesmo na janela de pré-visualização
            const booksPerRow = window.innerWidth > 600 ? 5 : 3;
            
            for(let i=0; i < students.length; i += booksPerRow) {
                const row = document.createElement('div');
                row.className = 'shelf-row';
                
                students.slice(i, i + booksPerRow).forEach((name, index) => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.style.animationDelay = `${index * 0.1}s`; // Stagger effect opcional
                    item.onclick = () => openModal(name);
                    
                    item.innerHTML = `
                        <div class="book-cover-small">
                            <div class="small-name-gold font-classic font-bold">${name}</div>
                        </div>
                        <div class="student-name-tag font-classic">${name.split(' ')[0]} ${name.split(' ').pop()}</div>
                    `;
                    row.appendChild(item);
                });
                container.appendChild(row);
            }
        }

        // Funções do Modal e Livro
        function openModal(name) {
            const modal = document.getElementById('book-modal');
            const book = document.getElementById('book-element');
            const img = document.getElementById('work-img');
            
            // Preencher dados
            document.getElementById('cover-name-text').innerText = name;
            document.getElementById('inner-student-name').innerText = name;
            
            const config = mediaConfig[name];
            img.src = config ? config.work : defaultCover;
            
            // Resetar estado do livro e exibir
            book.classList.remove('open');
            book.style.transform = "rotateX(5deg) scale(0.9)";
            modal.style.display = 'flex';
            
            // Animar entrada
            setTimeout(() => {
                book.style.transform = "rotateX(0deg) scale(1)";
            }, 50);
        }

        function toggleBookOpen(e) {
            e.stopPropagation(); // Evita cliques duplos
            const book = document.getElementById('book-element');
            if (!book.classList.contains('open')) {
                book.classList.add('open');
            }
        }

        function closeBook() {
            const book = document.getElementById('book-element');
            book.classList.remove('open');
            book.style.transform = "rotateX(5deg) scale(0.9)";
            
            setTimeout(() => { 
                document.getElementById('book-modal').style.display = 'none'; 
            }, 600);
        }

        // Funções de Zoom
        function openZoom(src) {
            const overlay = document.getElementById('zoom-overlay');
            const zoomImg = document.getElementById('zoomed-img-content');
            zoomImg.src = src;
            
            overlay.style.display = 'flex';
            // Força reflow para animação
            void overlay.offsetWidth;
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeZoom(e) {
            // Se clicar na imagem ou fora, fecha
            if(e) e.stopPropagation();
            const overlay = document.getElementById('zoom-overlay');
            overlay.classList.remove('show');
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = '';
            }, 400);
        }

        // Reajusta prateleiras ao redimensionar a janela
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const currentLabel = document.getElementById('current-class-label').innerText;
                if(currentLabel) renderShelf(currentLabel);
            }, 250);
        });
    </script>
</body>
</html>
