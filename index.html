<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&family=Playfair+Display:wght@700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #eaddca;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Seletor de Turma Inicial */
        #class-selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a120e; z-index: 5000; display: flex;
            justify-content: center; align-items: center; transition: opacity 0.6s ease;
        }

        .red-book-custom {
            width: 150px; height: 210px;
            background: linear-gradient(135deg, #a52a2a 0%, #7f1d1d 100%);
            border-radius: 4px 12px 12px 4px; position: relative;
            box-shadow: -5px 0 0 #5a1212, 10px 15px 35px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.3s;
        }
        .red-book-custom:hover { transform: scale(1.05) translateY(-10px); }
        .red-book-title { color: #d4af37; font-family: 'Playfair Display', serif; font-size: 2.5rem; }

        /* Sidebar (Menu Lateral) */
        #sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: #2d1b18; color: white; z-index: 6000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding: 40px 20px;
        }
        #sidebar.active { left: 0; }
        
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 5999; display: none;
            backdrop-filter: blur(4px);
        }

        .sidebar-item {
            padding: 15px 20px; margin-bottom: 10px; border-radius: 8px;
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
            font-family: 'Cinzel', serif; border: 1px solid transparent;
        }
        .sidebar-item:hover { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; color: #d4af37; }

        /* Menu Icon (3 Barrinhas) */
        .menu-icon {
            position: fixed; top: 25px; left: 25px; z-index: 4500;
            cursor: pointer; background: rgba(0,0,0,0.5); padding: 12px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s; display: none;
        }
        .menu-icon:hover { background: #d4af37; border-color: #fff; }

        /* Estante Estilizada */
        .library-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 20px; opacity: 0; transition: 0.8s; }
        .library-wrapper.visible { opacity: 1; }
        
        .bookcase { 
            background-color: #3e2723;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            border: 20px solid #2d1b18; 
            border-top-width: 35px; border-bottom-width: 45px; border-radius: 8px; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.7), inset 0 0 100px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }

        .shelf-row {
            background-color: #4e342e;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); 
            padding: 50px 30px 95px 30px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 40px;
            border-bottom: 28px solid #2d1b18; position: relative;
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.5), inset 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Livros na Estante */
        .book-item { width: 115px; height: 165px; position: relative; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .book-item:hover { transform: scale(1.1) translateY(-12px); z-index: 50; }
        
        .book-cover-small {
            width: 100%; height: 100%; border-radius: 2px 7px 7px 2px;
            box-shadow: 8px 12px 25px rgba(0,0,0,0.6);
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 12px; text-align: center; border-left: 5px solid #4a0e0e; overflow: hidden;
            background-image: linear-gradient(rgba(127, 29, 29, 0.88), rgba(90, 18, 18, 0.88)), url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');
            background-size: cover; background-position: center;
        }

        .small-name-gold {
            color: #f3e5ab; font-family: 'Playfair Display', serif; font-size: 0.62rem;
            font-weight: bold; line-height: 1.2; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .student-name-tag {
            position: absolute; bottom: -65px; left: 50%; transform: translateX(-50%);
            width: 150%; font-size: 0.72rem; font-weight: bold; color: #fff;
            text-align: center; text-transform: uppercase; text-shadow: 2px 2px 4px #000;
            background: rgba(0,0,0,0.4); padding: 5px; border-radius: 4px;
        }

        /* --- LIVRO 3D MODAL --- */
        #book-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 9999; display: none;
            justify-content: center; align-items: center; perspective: 2000px;
            backdrop-filter: blur(18px);
        }

        .book-container {
            width: 420px; height: 600px; position: relative; transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1); cursor: pointer;
        }

        .cover-main {
            position: absolute; width: 420px; height: 100%; left: 0; top: 0;
            background: linear-gradient(135deg, #8b0000 0%, #5a1212 100%) !important;
            z-index: 100; transform-origin: left; border-radius: 0 10px 10px 0;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            border-left: 18px solid #4a0e0e; padding: 45px; text-align: center;
        }
        .book-container.open .cover-main { transform: rotateY(-180deg); }

        .book-inner-pages {
            position: absolute; width: 840px; height: 100%; left: 0; 
            display: flex; opacity: 0; transition: opacity 0.5s ease;
            z-index: 10; pointer-events: none; transform-style: preserve-3d;
        }
        .book-container.open .book-inner-pages { opacity: 1; transition-delay: 0.4s; pointer-events: auto; }

        .page-base {
            width: 420px; height: 100%; background: #fdfaf3; padding: 45px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .page-left { border-radius: 8px 0 0 8px; background: linear-gradient(to right, #e8dfcc, #fdfaf3 15%); }
        .page-right { border-radius: 0 8px 8px 0; background: linear-gradient(to left, #e8dfcc, #fdfaf3 15%); }

        .work-image { width: 100%; max-height: 85%; object-fit: contain; border: 12px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }

        .audio-player-box {
            margin-top: 30px; background: #5d4037; color: white; padding: 18px 36px;
            border-radius: 60px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: 0.3s; font-weight: bold;
        }

        .close-btn {
            position: fixed; top: 35px; right: 35px; color: white; font-size: 2rem;
            cursor: pointer; z-index: 10000; background: rgba(255,255,255,0.12); width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* Frase em uma única linha */
        .single-line-quote {
            white-space: nowrap;
            width: 100%;
            text-align: center;
            overflow: visible;
        }

        @media (max-width: 900px) {
            .book-container { width: 320px; height: 480px; }
            .book-inner-pages { width: 640px; }
            .page-base { width: 320px; padding: 25px; }
            .single-line-quote { font-size: 0.85rem; }
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Menu Lateral (Sidebar) -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="sidebar">
        <h2 class="text-2xl font-bold mb-8 border-b border-amber-500/30 pb-4" style="font-family: 'Cherry Bomb One'">Trocar Turma</h2>
        <div class="sidebar-item" onclick="changeClass('5ºA')">Turma 5ºA</div>
        <div class="sidebar-item" onclick="changeClass('5ºB')">Turma 5ºB</div>
        <div class="sidebar-item" onclick="changeClass('5ºC')">Turma 5ºC</div>
        <div class="mt-20 opacity-50 text-xs uppercase tracking-widest text-center">Unidade Campolim</div>
    </div>

    <!-- Ícone de Menu -->
    <div class="menu-icon" id="main-menu-icon" onclick="openSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <!-- Modal Livro 3D -->
    <div id="book-modal">
        <div class="close-btn" onclick="closeBook()">✕</div>
        <div class="book-container" id="book-element" onclick="toggleBookOpen(event)">
            <div class="cover-main" id="modal-cover-front">
                <div class="main-title-gold text-[#d4af37] text-xl tracking-[5px] mb-8" style="font-family: 'Cinzel'">MÁGICO DE OZ</div>
                <div id="cover-name-text" class="main-name-gold text-[#f3e5ab] text-4xl font-bold" style="font-family: 'Playfair Display'"></div>
                <div class="click-hint absolute bottom-12 text-[#d4af37] animate-pulse">Clique para abrir</div>
            </div>

            <div class="book-inner-pages" id="inner-pages">
                <div class="page-base page-left">
                    <h2 id="inner-student-name" class="text-3xl font-bold text-amber-900 mb-2 text-center" style="font-family: 'Playfair Display'"></h2>
                    <div class="w-16 h-1.5 bg-amber-400 mb-8 rounded-full"></div>
                    <p class="single-line-quote text-amber-800 italic text-md mb-8">"Não há lugar como o nosso lar."</p>
                    <div class="audio-player-box" id="audio-trigger">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        Ouvir Gravação
                    </div>
                    <audio id="student-audio"></audio>
                </div>
                <div class="page-base page-right">
                    <img id="work-img" src="" class="work-image" alt="Trabalho">
                </div>
            </div>
        </div>
    </div>

    <!-- Seletor Inicial -->
    <div id="class-selector">
        <div class="text-center">
            <h1 class="text-white text-5xl font-bold mb-12" style="font-family: 'Cherry Bomb One';">Selecione a Turma</h1>
            <div class="flex gap-10 justify-center">
                <div class="red-book-custom" onclick="startApp('5ºA')"><span class="red-book-title">5ºA</span></div>
                <div class="red-book-custom" onclick="startApp('5ºB')"><span class="red-book-title">5ºB</span></div>
                <div class="red-book-custom" onclick="startApp('5ºC')"><span class="red-book-title">5ºC</span></div>
            </div>
        </div>
    </div>

    <header class="banner h-[260px] bg-amber-900 flex flex-col items-center justify-center text-white relative shadow-xl border-b-8 border-[#2d1b18]">
        <div class="absolute inset-0 opacity-45 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF')"></div>
        <h1 class="text-6xl font-bold relative z-10" style="font-family: 'Cherry Bomb One'; text-shadow: 5px 5px 0px #3e2723;">Estante Virtual</h1>
        <p class="relative z-10 mt-4 bg-amber-800/85 border border-amber-600/50 px-10 py-3 rounded-full text-md font-bold tracking-widest uppercase shadow-lg">Mágico de Oz • Unidade Campolim • <span id="current-class-label"></span></p>
    </header>

    <div class="library-wrapper" id="lib-view">
        <div class="bookcase" id="shelf-container"></div>
    </div>

    <script>
        const ozCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';
        const targetStudent = "ALÍCIA CALIXTO FALQUEIRO";
        const aliciaWork = "https://lh3.googleusercontent.com/d/19J-aT4ekQ9btD-mcWC7SBWGzY6ioe927";
        
        const studentsData = {
            '5ºA': ["ALÍCIA CALIXTO FALQUEIRO", "ANGELO BRUGINSKI SCUDERI", "ARTHUR KENJI NAKAGAWA", "BERNARDO CHRISTIAN RIBEIRO FREIRE", "CAROLINA DE QUEIROZ MOREIRA", "CECÍLIA LEONEL NALESSO", "DANIEL SALVARANI GUARINHO", "EDUARDO FANTAZZINI GRANDISOLI", "EMI SAKIHAMA", "FERNANDA AKARI KIMURA", "GAEL FARHA CONDE", "GUSTAVO DE SOUZA SAMPAIO", "GUSTAVO SILVA E SOUZA", "HELENA HERINGER ROCHA SAD", "HELOISA ROSA DE SOUZA BARRETO", "JÚLIA ROSÁTI SILVA", "LORENA DE CARVALHO SALLES", "LORENZO AMARAL FURIGO CARDOSO", "LUCAS CASTELLI ALBUQUERQUE", "LUCAS OLIVEIRA MAIA", "LUCAS TADEU MUNIZ DA SILVA", "LUIZA BELLOTTO BARRETTO", "MARINA SARTORETO FERNANDES", "PEDRO RIBEIRO DE OLIVEIRA", "RAFAEL WATANABE SOUZA BARBIERI", "RAFAELLA MUOIO POLIDO", "THEO BRITO SEGAMARCHI"],
            '5ºB': ["ALICE BELLUCCI ASCENCIO", "ALICE DE FREITAS OLHIER", "ANTONELLA JULIO VETTORAZZO CHIESA REY", "ARTHUR CORDEIRO PIZA", "BERNARDO VENTURA SÃO PIETRO", "CAROLINA SAES RUIZ", "CATARINA MARQUES RAMOS", "CECÍLIA ZAN BARROSO", "EDUARDO FRANCO TOLEDO PINTO", "ENZO ANDRADE ALVES", "FELIPE GUIMARÃES DE SOUZA", "GABRIEL YUZUI VICECONTI", "GIOVANI DIEZEL MUNHOZ", "GIULIA REZENDE PASSOS", "ISABELA AGOSTINELI TRIDAPALLI", "ISABELLA BOAVENTURA GOMES DA SILVA OLIVEIRA", "LARISSA DAMASCENO BRUDER SANTINI", "LÍVIA MAXCARENHAS BEDULLI", "LORENZO ATTIÊ BRUNI", "LUCAS BERNARDO MATUTINO DE OLIVEIRA", "MARCELLA TARABORELLI LIMONGELLI", "MARCELO SOUZA VARCA", "MARCUS MIGUEL CORDEIRO DE MORAES", "MARIA EDUARDA LEMOS LIMA", "MARIAH ANTONELLA MACIEL MAESTÁ", "MATEUS CARVALHO MADEIRA", "MATHEUS DA SILVA VACCARO", "PEDRO CAMPOS VIZCARRA ZUNIGA"],
            '5ºC': ["ALICE VIEIRA ESTEVES", "BEATRIZ PAZINI SOARES", "BERNARDO MICHELETTI FRANCISCO", "CECÍLIA SALCEDO FERNANDES", "CLARA COSTA RIBAS FRAMIL SANCHES", "DAVI CARVALHO DE VASCONCELOS", "ENRICO FESTINO MARTORELLI", "GABRIEL MAMEDE DE ALMEIDA FERREIRA", "GABRIEL RIBEIRO DA SILVA", "GIOVANNA DA SILVA PRESTES", "GIOVANNA LA TORRE MARTINS", "GIULIA VIEIRA SACCOMANO", "JOÃO LUCCA SANTI SILVA", "JOSÉ FORTE PESSOA JUNIOR", "LAURA AGRA DE MORAES", "LEONARDO DA SILVA CORRÊA", "LORENA MIDLEY PAULETTI", "LUIZA HIGUCHI ROSA", "MARI UEDA POSSATO VENANCIO", "MARIA FERNANDA RUIVO ALBIERO", "MARIA LÚCIA LODI PALHARES", "MATHEUS BORGES GARRIDO", "MATHEUS CARDOSO LICHMANN", "PEDRO DOS SANTOS FREITAS", "RAFAEL DE BARROS VICENTIN", "RAFAELA RAMALHO GUIRELI", "STELLA HOFFMANN FOGAÇA", "VALENTINA PALEARI CASSIMIRO", "VÍTOR HENRIQUE MARTINS DE PAULO"]
        };

        function startApp(className) {
            document.getElementById('class-selector').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('class-selector').style.display = 'none';
                document.getElementById('main-menu-icon').style.display = 'block';
                renderClass(className);
                document.body.classList.remove('overflow-hidden');
            }, 600);
        }

        function renderClass(className) {
            document.getElementById('current-class-label').innerText = className;
            document.getElementById('lib-view').classList.add('visible');
            renderShelf(className);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebar-overlay').style.display = 'block';
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        function changeClass(className) {
            closeSidebar();
            renderClass(className);
        }

        function renderShelf(className) {
            const container = document.getElementById('shelf-container');
            container.innerHTML = '';
            const students = studentsData[className];
            const perRow = 5;
            
            for(let i=0; i < students.length; i+=perRow) {
                const row = document.createElement('div');
                row.className = 'shelf-row';
                students.slice(i, i+perRow).forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'book-item';
                    item.onclick = () => openModal(name);
                    item.innerHTML = `
                        <div class="book-cover-small"><div class="small-name-gold">${name}</div></div>
                        <div class="student-name-tag">${name}</div>
                    `;
                    row.appendChild(item);
                });
                container.appendChild(row);
            }
        }

        function openModal(name) {
            const modal = document.getElementById('book-modal');
            const book = document.getElementById('book-element');
            document.getElementById('cover-name-text').innerText = name;
            document.getElementById('inner-student-name').innerText = name;
            
            const img = document.getElementById('work-img');
            img.src = (name === targetStudent) ? aliciaWork : ozCover;

            modal.style.display = 'flex';
            book.classList.remove('open');
            book.style.transform = "translateX(0) rotateX(5deg)";
        }

        function toggleBookOpen(e) {
            const book = document.getElementById('book-element');
            if (!book.classList.contains('open')) {
                book.classList.add('open');
                book.style.transform = "translateX(-210px) rotateX(0deg)";
            }
        }

        function closeBook() {
            const book = document.getElementById('book-element');
            document.getElementById('student-audio').pause();
            book.classList.remove('open');
            book.style.transform = "translateX(0) rotateX(5deg)";
            setTimeout(() => { document.getElementById('book-modal').style.display = 'none'; }, 850);
        }

        document.getElementById('audio-trigger').onclick = (e) => {
            e.stopPropagation();
            const audio = document.getElementById('student-audio');
            if(audio.src) audio.paused ? audio.play() : audio.pause();
        };
    </script>
</body>
</html>
