<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f7f3ed;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Menu de Turmas */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2500;
            cursor: pointer;
            background: #5d4037;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid #8d6e63;
        }
        .menu-btn div {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        #unit-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: #fff;
            z-index: 2600;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 80px 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
        }
        #unit-menu.active { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 2550;
            backdrop-filter: blur(4px);
        }

        /* Seletor de Turma */
        #class-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 33, 27, 0.8);
            z-index: 4000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            transition: opacity 0.5s ease;
        }
        .class-circle {
            width: 130px; height: 130px;
            background: #795548; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.4s; border: 6px solid #a1887f; margin: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        .class-circle:hover { transform: scale(1.1) translateY(-5px); background: #8d6e63; }

        /* Banner Principal */
        .banner {
            position: relative; height: 280px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .banner-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            background-size: cover; background-position: center;
            filter: brightness(0.6); z-index: -1;
        }
        .banner h1 { font-family: 'Cherry Bomb One', cursive; font-size: 3.5rem; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        .banner p { z-index: 10; }

        /* Container Principal da Biblioteca */
        .library-container {
            max-width: 1100px;
            margin: 0 auto 100px auto;
            padding: 20px;
        }

        /* ESTANTE DE MADEIRA - Estilo conforme imagem solicitada */
        .shelf-row {
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), 
                              linear-gradient(to bottom, #795548, #5d4037);
            background-color: #5d4037;
            margin-bottom: 80px;
            padding: 40px 30px 25px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            justify-items: center;
            
            /* Bordas e Profundidade da Madeira */
            border-radius: 4px;
            border-left: 15px solid #4e342e;
            border-right: 15px solid #4e342e;
            box-shadow: 
                inset 0 10px 20px rgba(0,0,0,0.4), /* Sombra interna topo */
                0 15px 30px rgba(0,0,0,0.3);      /* Sombra projetada no chão */
        }

        /* A Prateleira (Base de Madeira) */
        .shelf-row::after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: -15px;
            right: -15px;
            height: 25px;
            background: #3e2723;
            background-image: linear-gradient(to bottom, #4e342e, #2b1d1a);
            border-radius: 0 0 4px 4px;
            z-index: 5;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* Fundo da Estante (Parte de trás) */
        .shelf-row::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.15);
            pointer-events: none;
        }

        /* Livros */
        .book-container {
            width: 130px;
            perspective: 1000px;
            position: relative;
            margin-bottom: 20px;
            cursor: default;
            z-index: 10;
        }

        .book-cover {
            width: 100%;
            height: 190px;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform-origin: left;
            position: relative;
            z-index: 3;
            border-left: 4px solid rgba(0,0,0,0.2);
        }

        .book-pages {
            position: absolute;
            top: 4px;
            left: 5px;
            width: 98%;
            height: 182px;
            background: #fff;
            border-radius: 2px 8px 8px 2px;
            z-index: 1;
        }

        .book-container:hover .book-cover {
            transform: rotateY(-25deg) scale(1.08);
            box-shadow: 15px 10px 30px rgba(0,0,0,0.5);
        }

        /* Rótulo do Estudante - Estilo Placa de Madeira Clara ou Papel Antigo */
        .student-label {
            margin-top: 15px;
            background: #efebe9;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #3e2723;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            line-height: 1.1;
            min-height: 40px;
            border-bottom: 3px solid #d7ccc8;
        }

        footer {
            background: #efebe9;
            border-top: 5px solid #d7ccc8;
        }

        @media (max-width: 640px) {
            .shelf-row {
                grid-template-columns: repeat(2, 1fr);
                padding: 30px 10px 20px 10px;
            }
            .banner h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Menu Lateral -->
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="unit-menu">
        <h2 class="text-2xl font-bold mb-6 text-amber-900" style="font-family: 'Cherry Bomb One'">Biblioteca</h2>
        <ul class="space-y-4">
            <li class="p-4 hover:bg-amber-50 text-amber-900 font-bold rounded-xl cursor-pointer border-2 border-amber-100 flex items-center gap-3 transition-all" onclick="triggerChangeClass()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                Alterar Turma
            </li>
        </ul>
    </div>

    <!-- Seletor de Turma Inicial -->
    <div id="class-selector">
        <div class="text-center">
            <h2 class="font-bold text-4xl mb-12 text-white" style="font-family: 'Cherry Bomb One'">Escolha a Turma</h2>
            <div class="flex flex-wrap justify-center">
                <div class="class-circle" onclick="selectClass('5ºA')"><span>Turma</span><span>5ºA</span></div>
                <div class="class-circle" onclick="selectClass('5ºB')"><span>Turma</span><span>5ºB</span></div>
                <div class="class-circle" onclick="selectClass('5ºC')"><span>Turma</span><span>5ºC</span></div>
            </div>
        </div>
    </div>

    <!-- Cabeçalho -->
    <header class="banner">
        <div class="banner-bg"></div>
        <h1>Mágico de Oz</h1>
        <p class="mt-4 bg-black/40 backdrop-blur-md px-6 py-2 rounded-full font-bold">
            Unidade Campolim • <span id="display-class" class="text-amber-300">...</span> • 2026
        </p>
    </header>

    <!-- Área Principal da Estante -->
    <main class="library-container" id="shelf-manager"></main>

    <footer class="text-center py-12 text-amber-900/60 font-bold">
        <p>Projeto de Leitura - Profª Elaine • 2026</p>
    </footer>

    <script>
        const ozCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';
        
        const studentsByClass = {
            '5ºA': [
                "ALÍCIA CALIXTO FALQUEIRO", "ANGELO BRUGINSKI SCUDERI", "ARTHUR KENJI NAKAGAWA",
                "BERNARDO CHRISTIAN RIBEIRO FREIRE", "CAROLINA DE QUEIROZ MOREIRA", "CECÍLIA LEONEL NALESSO",
                "DANIEL SALVARANI GUARINHO", "EDUARDO FANTAZZINI GRANDISOLI", "EMI SAKIHAMA",
                "FERNANDA AKARI KIMURA", "GAEL FARHA CONDE", "GUSTAVO DE SOUZA SAMPAIO",
                "GUSTAVO SILVA E SOUZA", "HELENA HERINGER ROCHA SAD", "HELOISA ROSA DE SOUZA BARRETO",
                "JÚLIA ROSÁTI SILVA", "LORENA DE CARVALHO SALLES", "LORENZO AMARAL FURIGO CARDOSO",
                "LUCAS CASTELLI ALBUQUERQUE", "LUCAS OLIVEIRA MAIA", "LUCAS TADEU MUNIZ DA SILVA",
                "LUIZA BELLOTTO BARRETTO", "MARINA SARTORETO FERNANDES", "PEDRO RIBEIRO DE OLIVEIRA",
                "RAFAEL WATANABE SOUZA BARBIERI", "RAFAELLA MUOIO POLIDO", "THEO BRITO SEGAMARCHI"
            ],
            '5ºB': [
                "ALICE BELLUCCI ASCENCIO", "ALICE DE FREITAS OLHIER", "ANTONELLA JULIO VETTORAZZO CHIESA REY",
                "ARTHUR CORDEIRO PIZA", "BERNARDO VENTURA SÃO PIETRO", "CAROLINA SAES RUIZ",
                "CATARINA MARQUES RAMOS", "CECÍLIA ZAN BARROSO", "EDUARDO FRANCO TOLEDO PINTO",
                "ENZO ANDRADE ALVES", "FELIPE GUIMARÃES DE SOUZA", "GABRIEL YUZUI VICECONTI",
                "GIOVANI DIEZEL MUNHOZ", "GIULIA REZENDE PASSOS", "ISABELA AGOSTINELI TRIDAPALLI",
                "ISABELLA BOAVENTURA GOMES DA SILVA OLIVEIRA", "LARISSA DAMASCENO BRUDER SANTINI",
                "LÍVIA MASCARENHAS BEDULLI", "LORENZO ATTIÊ BRUNI", "LUCAS BERNARDO MATUTINO DE OLIVEIRA",
                "MARCELLA TARABORELLI LIMONGELLI", "MARCELO SOUZA VARCA", "MARCUS MIGUEL CORDEIRO DE MORAES",
                "MARIA EDUARDA LEMOS LIMA", "MARIAH ANTONELLA MACIEL MAESTÁ", "MATEUS CARVALHO MADEIRA",
                "MATHEUS DA SILVA VACCARO", "PEDRO CAMPOS VIZCARRA ZUNIGA"
            ],
            '5ºC': [
                "ALICE VIEIRA ESTEVES", "BEATRIZ PAZINI SOARES", "BERNARDO MICHELETTI FRANCISCO",
                "CECÍLIA SALCEDO FERNANDES", "CLARA COSTA RIBAS FRAMIL SANCHES", "DAVI CARVALHO DE VASCONCELOS",
                "ENRICO FESTINO MARTORELLI", "GABRIEL MAMEDE DE ALMEIDA FERREIRA", "GABRIEL RIBEIRO DA SILVA",
                "GIOVANNA DA SILVA PRESTES", "GIOVANNA LA TORRE MARTINS", "GIULIA VIEIRA SACCOMANO",
                "JOÃO LUCCA SANTI SILVA", "JOSÉ FORTE PESSOA JUNIOR", "LAURA AGRA DE MORAES",
                "LEONARDO DA SILVA CORRÊA", "LORENA MIDLEY PAULETTI", "LUIZA HIGUCHI ROSA",
                "MARI UEDA POSSATO VENANCIO", "MARIA FERNANDA RUIVO ALBIERO", "MARIA LÚCIA LODI PALHARES",
                "MATHEUS BORGES GARRIDO", "MATHEUS CARDOSO LICHMANN", "PEDRO DOS SANTOS FREITAS",
                "RAFAEL DE BARROS VICENTIN", "RAFAELA RAMALHO GUIRELI", "STELLA HOFFMANN FOGAÇA",
                "VALENTINA PALEARI CASSIMIRO", "VÍTOR HENRIQUE MARTINS DE PAULO"
            ]
        };

        function initLibrary(className) {
            const container = document.getElementById('shelf-manager');
            container.innerHTML = '';
            
            const students = studentsByClass[className] || [];
            const booksPerRow = 5;
            const rowsCount = Math.ceil(students.length / booksPerRow);

            for (let i = 0; i < rowsCount; i++) {
                const shelf = document.createElement('div');
                shelf.className = 'shelf-row';
                
                for (let j = 0; j < booksPerRow; j++) {
                    const studentIndex = (i * booksPerRow) + j;
                    if (studentIndex >= students.length) break;

                    const studentName = students[studentIndex];
                    
                    const bookContainer = document.createElement('div');
                    bookContainer.className = 'book-container';
                    
                    bookContainer.innerHTML = `
                        <div class="book-pages"></div>
                        <div class="book-cover" style="background-image: url('${ozCover}')"></div>
                        <span class="student-label">${studentName}</span>
                    `;
                    shelf.appendChild(bookContainer);
                }
                container.appendChild(shelf);
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('unit-menu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function triggerChangeClass() {
            toggleMenu();
            const selector = document.getElementById('class-selector');
            selector.style.display = 'flex';
            selector.style.opacity = '1';
            document.body.classList.add('overflow-hidden');
        }

        function selectClass(className) {
            document.getElementById('display-class').innerText = className;
            const selector = document.getElementById('class-selector');
            selector.style.opacity = '0';
            setTimeout(() => {
                selector.style.display = 'none';
                document.body.classList.remove('overflow-hidden');
            }, 500);
            initLibrary(className);
        }

        window.onload = () => {
            document.body.classList.add('overflow-hidden');
        };
    </script>
</body>
</html>
