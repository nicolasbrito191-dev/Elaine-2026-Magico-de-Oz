<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f4f0; /* Tom verde menta bem claro */
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Menu de 3 linhas */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2500;
            cursor: pointer;
            background: #8eb486;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        .menu-btn div {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        #unit-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 2600;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 80px 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.05);
        }
        #unit-menu.active { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 2550;
            backdrop-filter: blur(4px);
        }

        /* Seletor de Turma Inicial */
        #class-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            z-index: 4000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            transition: opacity 0.5s ease;
        }
        .class-circle {
            width: 130px; height: 130px;
            background: #8eb486; color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.4s; border: 6px solid white; margin: 15px;
            box-shadow: 0 8px 20px rgba(142, 180, 134, 0.3);
            font-weight: bold;
        }
        .class-circle:hover { transform: scale(1.1) translateY(-5px); background: #7aa371; }

        /* Banner */
        .banner {
            position: relative; height: 300px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; overflow: hidden;
            margin-bottom: 40px;
        }
        .banner-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            background-size: cover; background-position: center;
            filter: brightness(0.7); z-index: -1;
        }
        .banner h1 { font-family: 'Cherry Bomb One', cursive; font-size: 3.5rem; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); }

        /* Estante Estilo Organizador Infantil */
        .library-container {
            max-width: 1000px; margin: 0 auto 60px auto; padding: 20px;
            background: white;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            border: 12px solid #fff;
        }
        
        .shelf-unit {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
        }

        .shelf-row {
            background: #e0e7e0; /* Fundo da prateleira */
            border-radius: 15px;
            margin-bottom: 40px;
            padding: 30px 20px 15px 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            position: relative;
            /* O "degrau" da prateleira */
            border-bottom: 15px solid #d4ddd4;
        }

        /* O Livro Aberto (Capa Frontal) */
        .book-container {
            width: 140px;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            margin-bottom: 20px;
        }

        .book-cover {
            width: 100%;
            height: 190px;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: left;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Páginas simuladas atrás da capa */
        .book-pages {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 100%;
            height: 180px;
            background: #f9f9f9;
            border-radius: 5px 15px 15px 5px;
            z-index: 1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .book-container:hover .book-cover {
            transform: rotateY(-35deg) scale(1.05);
            box-shadow: 15px 10px 30px rgba(0,0,0,0.2);
        }

        /* Nome do Aluno estilo etiqueta */
        .student-label {
            margin-top: 12px;
            background: #fff;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #7aa371;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: block;
        }

        /* Viewer */
        #viewer-section {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 3000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .viewer-content { 
            background: white; width: 95%; max-width: 900px; height: 90vh; 
            border-radius: 25px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 8px solid white;
        }

        /* Footer */
        footer {
            background: white;
            border-top: 2px solid #f0f4f0;
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Menu Hambúrguer -->
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="unit-menu">
        <h2 class="text-2xl font-bold mb-6 text-green-800" style="font-family: 'Cherry Bomb One'">Menu</h2>
        <ul class="space-y-4">
            <li class="p-4 hover:bg-green-50 text-green-700 font-bold rounded-xl cursor-pointer border-2 border-green-100 flex items-center gap-3 transition-all" onclick="triggerChangeClass()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                Trocar Turma
            </li>
        </ul>
    </div>

    <!-- Seletor de Turma -->
    <div id="class-selector">
        <div class="text-center">
            <h2 class="font-bold text-4xl mb-12 text-green-900" style="font-family: 'Cherry Bomb One'">Escolha a Turma</h2>
            <div class="flex flex-wrap justify-center">
                <div class="class-circle" onclick="selectClass('5ºA')"><span>Turma</span><span>5ºA</span></div>
                <div class="class-circle" onclick="selectClass('5ºB')"><span>Turma</span><span>5ºB</span></div>
                <div class="class-circle" onclick="selectClass('5ºC')"><span>Turma</span><span>5ºC</span></div>
            </div>
        </div>
    </div>

    <header class="banner">
        <div class="banner-bg"></div>
        <h1>Mágico de Oz</h1>
        <p class="mt-4 bg-white/20 backdrop-blur-md px-6 py-2 rounded-full font-bold">
            Unidade Campolim • <span id="display-class" class="text-yellow-300">...</span> • 2026
        </p>
    </header>

    <main class="library-container">
        <div class="shelf-unit" id="shelf-manager">
            <!-- As estantes face-out serão geradas via JS -->
        </div>
    </main>

    <section id="viewer-section">
        <div class="viewer-content">
            <div class="flex justify-between items-center p-6 bg-white border-b-2 border-gray-100">
                <span id="viewer-title" class="font-bold text-xl text-green-800">Obra Literária</span>
                <button onclick="closeViewer()" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all px-6 py-2 rounded-full font-bold">Fechar</button>
            </div>
            <iframe id="viewer-frame" class="w-full h-full" src=""></iframe>
        </div>
    </section>

    <footer class="text-center py-10 text-gray-400 font-bold">
        <p>Projeto de Leitura - Profª Elaine • 2026</p>
        <div class="flex justify-center gap-4 mt-4 opacity-30">
            <div class="w-8 h-8 rounded-full bg-green-200"></div>
            <div class="w-8 h-8 rounded-full bg-yellow-200"></div>
            <div class="w-8 h-8 rounded-full bg-blue-200"></div>
        </div>
    </footer>

    <script>
        // Link da imagem de capa que você enviou (convertido para link direto se necessário)
        const ozCover = 'https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ';

        const booksData = [
            { id: '1CIa7AGwfkMk1lJO6pRGB5vRiRgi81gb8' },
            { id: '1Yzl6id0zIhUVROSxGOWkBKwE2yaZq-B0' },
            { id: '16emG3qFuxazoi5yuFoVUIy8LSmm5Re3e' },
            { id: '1h31wSTwJf_8VzhuarZbPpX3Y5Xvolduz' },
            { id: '1gmoAH6yxT-333xL4CJJDm9l-0ClGszAa' }
        ];

        function initLibrary() {
            const container = document.getElementById('shelf-manager');
            container.innerHTML = '';
            
            // Criaremos 4 grandes prateleiras estilo display
            for (let i = 0; i < 4; i++) {
                const shelf = document.createElement('div');
                shelf.className = 'shelf-row';
                
                // 7 ou 8 livros por prateleira para preencher bem
                for (let j = 0; j < 8; j++) {
                    const studentIndex = (i * 8) + j + 1;
                    // Limita a 30 alunos (ajuste se necessário)
                    if (studentIndex > 30) break;

                    const bookInfo = booksData[j % booksData.length];
                    
                    const bookContainer = document.createElement('div');
                    bookContainer.className = 'book-container';
                    bookContainer.onclick = () => openViewer(`Obra de Aluno ${studentIndex}`, bookInfo.id);
                    
                    bookContainer.innerHTML = `
                        <div class="book-pages"></div>
                        <div class="book-cover" style="background-image: url('${ozCover}')"></div>
                        <span class="student-label">Aluno ${studentIndex}</span>
                    `;
                    shelf.appendChild(bookContainer);
                }
                container.appendChild(shelf);
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('unit-menu');
            const overlay = document.querySelector('.menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function triggerChangeClass() {
            toggleMenu();
            const selector = document.getElementById('class-selector');
            selector.style.display = 'flex';
            selector.style.opacity = '1';
            document.body.classList.add('overflow-hidden');
        }

        function selectClass(className) {
            document.getElementById('display-class').innerText = className;
            const selector = document.getElementById('class-selector');
            selector.style.opacity = '0';
            setTimeout(() => {
                selector.style.display = 'none';
                document.body.classList.remove('overflow-hidden');
            }, 500);
            initLibrary();
        }

        function openViewer(title, fileId) {
            const viewer = document.getElementById('viewer-section');
            const frame = document.getElementById('viewer-frame');
            document.getElementById('viewer-title').innerText = title;
            frame.src = `https://drive.google.com/file/d/${fileId}/preview`;
            viewer.style.display = 'flex';
            document.body.classList.add('overflow-hidden');
        }

        function closeViewer() {
            document.getElementById('viewer-section').style.display = 'none';
            document.getElementById('viewer-frame').src = '';
            document.body.classList.remove('overflow-hidden');
        }

        window.onload = () => {
            document.body.classList.add('overflow-hidden');
        };

        initLibrary();
    </script>
</body>
</html>
