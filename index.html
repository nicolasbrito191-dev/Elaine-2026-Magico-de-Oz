<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto de Leitura: Mágico de Oz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f4f0;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* Estilo do Banner com imagem ofuscada */
        .banner {
            position: relative;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            border-bottom: 8px solid #4a6741;
        }

        .banner-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1hm2VI0Mr65rQhvowKYC2jcFE3-KR5EoF');
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.6);
            transform: scale(1.1);
            z-index: -1;
        }

        .banner h1 {
            font-family: 'Cherry Bomb One', cursive;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-shadow: 4px 4px 0px #2d4f2a;
            margin-bottom: 0.5rem;
            padding: 0 20px;
            line-height: 1.1;
        }

        .banner p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            background: rgba(74, 103, 65, 0.9);
            padding: 8px 25px;
            border-radius: 50px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        /* Estilo da Estante */
        .shelf-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .shelf {
            background: #d2b48c; 
            border-bottom: 20px solid #a67c52;
            border-left: 12px solid #bc8f8f;
            border-right: 12px solid #bc8f8f;
            padding: 60px 30px 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 30px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: relative;
        }

        .book {
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            margin-bottom: -5px;
        }

        .book:hover {
            transform: translateY(-50px) rotate(-3deg) scale(1.15);
            z-index: 10;
        }

        .book-cover {
            width: 100%;
            height: 220px;
            border-radius: 3px 10px 10px 3px;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
            border-left: 6px solid rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            background-color: #eee;
        }

        .book-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(74, 103, 65, 0.95);
            color: white;
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .book:hover .book-overlay {
            transform: translateY(0);
        }

        /* Seção de Visualização (Modal) */
        #viewer-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .viewer-content {
            background: white;
            width: 95%;
            max-width: 900px;
            height: 90vh;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: modalPop 0.4s ease-out;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .viewer-header {
            padding: 15px 25px;
            background: #4a6741;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #e74c3c;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .close-btn:hover { background: #c0392b; transform: scale(1.1); }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .section-title {
            font-family: 'Cherry Bomb One', cursive;
            color: #4a6741;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .clouds-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4;
        }

        .footer {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="clouds-bg">
        <svg viewBox="0 0 100 100" style="position: absolute; top: 10%; left: 5%; width: 100px;">
            <path fill="white" d="M25,60 a20,20 0 0,1 0,-40 a20,20 0 0,1 40,0 a20,20 0 0,1 0,40 Z" />
        </svg>
        <svg viewBox="0 0 100 100" style="position: absolute; top: 15%; right: 10%; width: 120px;">
            <path fill="white" d="M25,60 a20,20 0 0,1 0,-40 a20,20 0 0,1 40,0 a20,20 0 0,1 0,40 Z" />
        </svg>
    </div>

    <!-- Cabeçalho -->
    <header class="banner">
        <div class="banner-bg"></div>
        <h1>Projeto de Leitura:<br>Mágico de Oz</h1>
        <p>5º Ano • Profª Elaine</p>
    </header>

    <main>
        <div class="mt-16 mb-4">
            <h2 class="section-title">Conheça nossas obras:</h2>
            <p class="text-center text-gray-600 italic">Clique nos livros para ler os poemas aqui mesmo</p>
        </div>

        <div class="shelf-container">
            <div class="shelf">
                <!-- Capa Unificada baseada na imagem enviada -->
                <!-- Botões chamam a função openViewer em vez de link direto -->
                
                <div onclick="openViewer('Obra 1', '1CIa7AGwfkMk1lJO6pRGB5vRiRgi81gb8')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 1</div>
                    </div>
                </div>

                <div onclick="openViewer('Obra 2', '1Yzl6id0zIhUVROSxGOWkBKwE2yaZq-B0')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 2</div>
                    </div>
                </div>

                <div onclick="openViewer('Obra 3', '16emG3qFuxazoi5yuFoVUIy8LSmm5Re3e')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 3</div>
                    </div>
                </div>

                <div onclick="openViewer('Obra 4', '1h31wSTwJf_8VzhuarZbPpX3Y5Xvolduz')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 4</div>
                    </div>
                </div>

                <div onclick="openViewer('Obra 5', '1gmoAH6yxT-333xL4CJJDm9l-0ClGszAa')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 5</div>
                    </div>
                </div>

                <div onclick="openViewer('Obra 6', '1vG8csYqm9Rkl5xYl0wBvxI_afqJB2WJQ')" class="book">
                    <div class="book-cover" style="background-image: url('https://lh3.googleusercontent.com/d/1nEdtoMa2uNyQ7cxL6R21oySfKWBuRqQJ');">
                        <div class="book-overlay">Abrir Obra 6</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Visualizador de Poemas -->
    <section id="viewer-section">
        <div class="viewer-content">
            <div class="viewer-header">
                <h3 id="viewer-title" class="font-bold text-xl">Lendo Obra</h3>
                <div class="close-btn" onclick="closeViewer()">X</div>
            </div>
            <div id="viewer-body" class="flex-grow">
                <!-- O iframe do Google Drive será carregado aqui -->
                <iframe id="viewer-frame" src="" allow="autoplay"></iframe>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="flex justify-center gap-4 mb-4">
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
            <span class="w-3 h-3 rounded-full bg-red-500"></span>
        </div>
        <p>Aventura na Estrada de Tijolos Amarelos • 2024</p>
    </footer>

    <script>
        function openViewer(title, fileId) {
            const viewer = document.getElementById('viewer-section');
            const frame = document.getElementById('viewer-frame');
            const titleElement = document.getElementById('viewer-title');
            
            // Link de "preview" do Google Drive funciona melhor dentro de iframes
            const driveLink = `https://drive.google.com/file/d/${fileId}/preview`;
            
            titleElement.innerText = title;
            frame.src = driveLink;
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Impede o scroll do fundo
        }

        function closeViewer() {
            const viewer = document.getElementById('viewer-section');
            const frame = document.getElementById('viewer-frame');
            
            viewer.style.display = 'none';
            frame.src = ''; // Limpa o iframe para economizar memória e parar o som
            document.body.style.overflow = 'auto'; // Reabilita o scroll
        }

        // Fechar ao clicar fora do conteúdo branco
        document.getElementById('viewer-section').addEventListener('click', function(e) {
            if (e.target === this) {
                closeViewer();
            }
        });
    </script>

</body>
</html>
